<!DOCTYPE html>

<html class="light" lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,400;0,700;1,400&amp;family=Quicksand:wght@400;500;600;700&amp;family=Poppins:wght@700&amp;family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#8f4552",
                        "primary-container": "#ac5d6a",
                        "on-primary": "#ffffff",
                        "secondary": "#864e58",
                        "secondary-container": "#feb6c1",
                        "on-secondary": "#ffffff",
                        "tertiary": "#7d540c",
                        "background": "#fff8f5",
                        "surface": "#fff8f5",
                        "surface-container": "#f6ece7",
                        "surface-container-high": "#f0e6e1",
                        "outline": "#867274",
                        "outline-variant": "#d8c1c3",
                        "on-surface": "#1f1b18",
                        "on-surface-variant": "#534345",
                        "error": "#ba1a1a"
                    },
                    fontFamily: {
                        "headline": ["Noto Serif"],
                        "body": ["Quicksand"],
                        "label": ["Quicksand"],
                        "data": ["Poppins"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "2xl": "1rem", "3xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body {
            background-color: #FFF5F0;
            color: #4A3228;
            font-family: 'Quicksand', sans-serif;
        }
        .font-serif { font-family: 'Noto Serif', serif; }
        .font-sans { font-family: 'Quicksand', sans-serif; }
        .font-data { font-family: 'Poppins', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="min-h-screen pb-24">
<!-- TopAppBar -->
<header class="bg-[#FFF5F0] dark:bg-[#1E1814] fixed top-0 w-full z-50">
<div class="flex justify-between items-center px-6 py-4 w-full max-w-4xl mx-auto">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-[#C4707E] dark:text-[#D4919C] cursor-pointer hover:opacity-80 transition-opacity">menu</span>
<h1 class="font-serif italic text-2xl text-[#C4707E] dark:text-[#D4919C]">Atelier de Preços</h1>
</div>
<div class="w-10 h-10 rounded-full overflow-hidden bg-[#F5E1DB]">
<img alt="Foto de perfil do empreendedor" class="w-full h-full object-cover" data-alt="close-up portrait of a friendly artisan woman in a light linen apron in a sunlit craft studio background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCN0oUTWB322LqduEpT8xETiKIIwUBvN2tTw9gX6cpTXfFcDF7BplfmYRq3o68TDcoTAghlTheoyq44Qijyy6a_qM8_QNqLmIb7Vjo9yXvJ6o_OVtdPkUErHXWV_JBN6gPCo1FbMIzxX_nB7FhgIKcW8uRGQppHGScsl2KiVKubDYehqImTmbHC9eibP7pvybTGRQhnacmi2IOlsPP4lo-JIDdkbiV4rriAThPM-cs669reVoaHI3u7t22TJHp6Yke8TiAoC5EN6zg"/>
</div>
</div>
<div class="bg-[#F5E1DB] dark:bg-[#2C2420] h-px w-full opacity-20"></div>
</header>
<main class="pt-24 px-6 max-w-lg mx-auto">
<!-- Progress Dots -->
<div class="flex justify-center gap-3 mb-10">
<div class="w-2.5 h-2.5 rounded-full bg-[#F5E1DB]"></div>
<div class="w-2.5 h-2.5 rounded-full bg-[#F5E1DB]"></div>
<div class="w-2.5 h-2.5 rounded-full bg-[#F5E1DB]"></div>
<div class="w-2.5 h-2.5 rounded-full bg-[#F5E1DB]"></div>
<div class="w-2.5 h-2.5 rounded-full bg-[#C4707E]"></div>
</div>
<!-- Header Section -->
<section class="mb-10 text-center relative">
<h2 class="font-serif text-4xl text-[#4A3228] dark:text-[#F5E1DB] mb-2">Margem de lucro</h2>
<p class="text-[#8B7355] text-sm italic">Quanto você deseja ganhar sobre cada unidade?</p>
<!-- Decorative Illustration -->
<div class="absolute -top-6 -right-8 opacity-20 pointer-events-none">
<span class="material-symbols-outlined text-6xl text-[#C4707E]">bakery_dining</span>
</div>
</section>
<!-- Profit Margin Grid -->
<div class="grid grid-cols-3 gap-3 mb-8">
<button class="bg-[#F5E1DB] text-[#4A3228] py-4 rounded-2xl font-semibold hover:bg-[#C4707E] hover:text-white transition-all">30%</button>
<button class="bg-[#F5E1DB] text-[#4A3228] py-4 rounded-2xl font-semibold hover:bg-[#C4707E] hover:text-white transition-all">50%</button>
<button class="bg-[#F5E1DB] text-[#4A3228] py-4 rounded-2xl font-semibold hover:bg-[#C4707E] hover:text-white transition-all">80%</button>
<button class="bg-[#C4707E] text-white py-4 rounded-2xl font-semibold scale-95 duration-150">100%</button>
<button class="bg-[#F5E1DB] text-[#4A3228] py-4 rounded-2xl font-semibold hover:bg-[#C4707E] hover:text-white transition-all">150%</button>
<button class="bg-[#F5E1DB] text-[#4A3228] py-4 rounded-2xl font-semibold hover:bg-[#C4707E] hover:text-white transition-all">200%</button>
</div>
<!-- Custom Input -->
<div class="mb-12">
<label class="block text-[#8B7355] text-sm mb-3 ml-1">Ou digite:</label>
<div class="relative">
<input class="w-full bg-white border-none rounded-2xl px-6 py-4 text-xl font-semibold text-[#4A3228] focus:ring-2 focus:ring-[#C4707E]/20 placeholder-[#D8C1C3]" placeholder="___%" type="text"/>
<div class="absolute right-6 top-1/2 -translate-y-1/2 text-[#C4707E]">
<span class="material-symbols-outlined">edit</span>
</div>
</div>
</div>
<!-- Preview Card -->
<div class="bg-white rounded-[32px] p-8 mb-10 text-center relative overflow-hidden group">
<div class="absolute top-0 right-0 w-24 h-24 bg-[#FFF5F0] rounded-bl-full -mr-4 -mt-4 transition-transform group-hover:scale-110"></div>
<h3 class="font-serif text-[#8B7355] text-lg mb-4 relative z-10">Preço sugerido</h3>
<div class="flex flex-col items-center relative z-10">
<span class="font-data text-5xl font-bold text-[#6BBF96]">R$ 8,50</span>
<span class="text-xs text-[#8B7355] mt-2 tracking-widest uppercase">Por unidade</span>
</div>
</div>
<!-- Action Button -->
<button class="w-full bg-[#C4707E] text-white py-5 rounded-2xl text-lg font-bold hover:opacity-90 transition-opacity active:scale-[0.98] transition-transform flex items-center justify-center gap-3">
            Ver Resultado
            <span class="material-symbols-outlined">chevron_right</span>
</button>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center px-4 pb-6 pt-3 bg-[#FFF5F0]/70 dark:bg-[#1E1814]/70 backdrop-blur-md rounded-t-[24px] z-50">
<div class="flex flex-col items-center justify-center text-[#8B7355] dark:text-[#F5E1DB]/50 opacity-70 hover:text-[#C4707E] transition-colors cursor-pointer">
<span class="material-symbols-outlined">home</span>
<span class="font-sans text-[10px] font-semibold uppercase tracking-wider mt-1">Início</span>
</div>
<div class="flex flex-col items-center justify-center bg-[#F5E1DB] dark:bg-[#2C2420] text-[#C4707E] rounded-2xl px-3 py-1.5 transition-transform duration-200 active:scale-90 cursor-pointer">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">calculate</span>
<span class="font-sans text-[10px] font-semibold uppercase tracking-wider mt-1">Cálculos</span>
</div>
<div class="flex flex-col items-center justify-center text-[#8B7355] dark:text-[#F5E1DB]/50 opacity-70 hover:text-[#C4707E] transition-colors cursor-pointer">
<span class="material-symbols-outlined">history</span>
<span class="font-sans text-[10px] font-semibold uppercase tracking-wider mt-1">Histórico</span>
</div>
<div class="flex flex-col items-center justify-center text-[#8B7355] dark:text-[#F5E1DB]/50 opacity-70 hover:text-[#C4707E] transition-colors cursor-pointer">
<span class="material-symbols-outlined">lightbulb</span>
<span class="font-sans text-[10px] font-semibold uppercase tracking-wider mt-1">Dicas</span>
</div>
<div class="flex flex-col items-center justify-center text-[#8B7355] dark:text-[#F5E1DB]/50 opacity-70 hover:text-[#C4707E] transition-colors cursor-pointer">
<span class="material-symbols-outlined">person</span>
<span class="font-sans text-[10px] font-semibold uppercase tracking-wider mt-1">Perfil</span>
</div>
</nav>
</body></html>
