<!DOCTYPE html>

<html class="dark" lang="pt-br"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&amp;family=Quicksand:wght@300..700&amp;family=Poppins:wght@400;600;700&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#C4707E",
              "secondary": "#D4919C",
              "background": "#1E1814",
              "surface": "#2C2420",
              "on-surface": "#F5E1DB",
              "text-main": "#F5E1DB",
              "text-sub": "#8B7355",
              "accent-gold": "#D4A054"
            },
            fontFamily: {
              "serif": ["Playfair Display", "serif"],
              "sans": ["Quicksand", "sans-serif"],
              "numbers": ["Poppins", "sans-serif"]
            },
            borderRadius: {
              "none": "0",
              "sm": "0.125rem",
              "DEFAULT": "0.25rem",
              "md": "0.375rem",
              "lg": "1rem",
              "xl": "1.25rem",
              "2xl": "1.5rem",
              "3xl": "2rem",
              "full": "9999px",
            },
          },
        },
      }
    </script>
<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        vertical-align: middle;
      }
      body {
        background-color: #1E1814;
        color: #F5E1DB;
      }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-sans antialiased selection:bg-primary/30">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-[#1E1814]">
<div class="flex justify-between items-center px-6 py-4 w-full max-w-4xl mx-auto">
<div class="flex items-center gap-4">
<button class="hover:opacity-80 transition-opacity">
<span class="material-symbols-outlined text-[#D4919C] text-2xl" data-icon="menu">menu</span>
</button>
<h1 class="font-serif italic text-2xl text-[#D4919C]">Atelier de Preços</h1>
</div>
<div class="w-10 h-10 rounded-full bg-surface border border-primary/20 flex items-center justify-center overflow-hidden">
<img alt="Foto de perfil do empreendedor" class="w-full h-full object-cover" data-alt="Close-up of a professional pastry chef in a dark chocolate colored kitchen, warm ambient lighting, elegant artisanal atmosphere" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDYg2nEXuPeO2NKrT2iBYxKDFKo2wYfkfUpsvEp--QkUL8eAkv8mQVzZ66RBoY4RHVW9n1u7TpWWbZthW4sRz-6pQjQl6j_HGWRyCI5WNdWrerLMZPHskA5WuVp0CpZTUCUXSQZ6vpgK1e9stLHYsMzeetA7RKJvSFUJnK8xsL0BkfUC6tvyJ6-RtkYPdpT4b-npax0IComfHE4CtQ8lMIlzxT9pbJRHSiLd_kLtDkMW1ReGcPISOCtOIiFJ_xhAu3f-zcZn8EC3PM"/>
</div>
</div>
<div class="bg-[#2C2420] h-px w-full opacity-20"></div>
</header>
<main class="pt-24 pb-32 px-6 max-w-lg mx-auto min-h-screen">
<!-- Step Indicator -->
<div class="flex justify-center gap-3 mb-12">
<div class="w-2.5 h-2.5 rounded-full bg-text-sub/30"></div>
<div class="w-2.5 h-2.5 rounded-full bg-text-sub/30"></div>
<div class="w-2.5 h-2.5 rounded-full bg-text-sub/30"></div>
<div class="w-2.5 h-2.5 rounded-full bg-text-sub/30"></div>
<div class="w-2.5 h-2.5 rounded-full bg-primary ring-4 ring-primary/20"></div>
</div>
<!-- Header Section -->
<section class="mb-10 text-center">
<h2 class="font-serif text-4xl text-on-surface mb-3 tracking-tight">Margem de lucro</h2>
<p class="text-text-sub font-sans text-sm max-w-[280px] mx-auto leading-relaxed">
                Quanto você deseja lucrar livre sobre cada venda realizada?
            </p>
</section>
<!-- Selection Pills Grid -->
<div class="grid grid-cols-3 gap-3 mb-10">
<button class="bg-surface hover:bg-primary/10 border border-transparent transition-all py-4 px-2 rounded-xl flex flex-col items-center gap-1 group">
<span class="font-numbers font-bold text-lg text-on-surface group-hover:text-primary">10%</span>
<span class="text-[10px] uppercase tracking-widest text-text-sub">Mínima</span>
</button>
<button class="bg-surface hover:bg-primary/10 border border-transparent transition-all py-4 px-2 rounded-xl flex flex-col items-center gap-1 group">
<span class="font-numbers font-bold text-lg text-on-surface group-hover:text-primary">20%</span>
<span class="text-[10px] uppercase tracking-widest text-text-sub">Padrão</span>
</button>
<button class="bg-primary/20 ring-2 ring-primary py-4 px-2 rounded-xl flex flex-col items-center gap-1">
<span class="font-numbers font-bold text-lg text-primary">30%</span>
<span class="text-[10px] uppercase tracking-widest text-primary font-bold">Ideal</span>
</button>
<button class="bg-surface hover:bg-primary/10 border border-transparent transition-all py-4 px-2 rounded-xl flex flex-col items-center gap-1 group">
<span class="font-numbers font-bold text-lg text-on-surface group-hover:text-primary">50%</span>
<span class="text-[10px] uppercase tracking-widest text-text-sub">Alta</span>
</button>
<button class="bg-surface hover:bg-primary/10 border border-transparent transition-all py-4 px-2 rounded-xl flex flex-col items-center gap-1 group">
<span class="font-numbers font-bold text-lg text-on-surface group-hover:text-primary">70%</span>
<span class="text-[10px] uppercase tracking-widest text-text-sub">Premium</span>
</button>
<button class="bg-surface hover:bg-primary/10 border border-transparent transition-all py-4 px-2 rounded-xl flex flex-col items-center gap-1 group italic">
<span class="material-symbols-outlined text-text-sub group-hover:text-primary" data-icon="edit">edit</span>
<span class="text-[10px] uppercase tracking-widest text-text-sub">Personal.</span>
</button>
</div>
<!-- Preview Card -->
<div class="bg-surface rounded-3xl p-6 relative overflow-hidden mb-12 border border-on-surface/5">
<div class="absolute -right-4 -top-4 opacity-10">
<span class="material-symbols-outlined text-8xl" data-icon="payments">payments</span>
</div>
<div class="relative z-10">
<div class="flex items-center gap-2 mb-4">
<span class="material-symbols-outlined text-accent-gold text-sm" data-icon="star" style="font-variation-settings: 'FILL' 1;">star</span>
<span class="text-[10px] font-sans font-bold uppercase tracking-widest text-text-sub">Resumo Estimado</span>
</div>
<div class="space-y-4">
<div class="flex justify-between items-end border-b border-on-surface/5 pb-3">
<span class="text-text-sub text-sm">Custo de Produção</span>
<span class="font-numbers text-on-surface">R$ 42,50</span>
</div>
<div class="flex justify-between items-end border-b border-on-surface/5 pb-3">
<span class="text-text-sub text-sm">Margem (30%)</span>
<span class="font-numbers text-primary font-bold">+ R$ 12,75</span>
</div>
<div class="flex justify-between items-center pt-2">
<span class="text-on-surface font-serif text-lg italic">Preço Sugerido</span>
<div class="text-right">
<span class="text-xs text-text-sub block">Venda por:</span>
<span class="font-numbers text-2xl font-bold text-on-surface tracking-tight">R$ 55,25</span>
</div>
</div>
</div>
</div>
</div>
<!-- Action Button -->
<button class="w-full bg-primary text-white font-sans font-bold py-5 rounded-2xl text-lg hover:opacity-90 transition-all active:scale-95 flex items-center justify-center gap-3">
            Ver Resultado
            <span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center px-4 pb-6 pt-3 bg-[#1E1814]/70 backdrop-blur-md z-50 rounded-t-[24px]">
<div class="flex flex-col items-center justify-center text-[#8B7355] dark:text-[#F5E1DB]/50 opacity-70 hover:text-[#C4707E] transition-colors">
<span class="material-symbols-outlined mb-1" data-icon="home">home</span>
<span class="font-sans text-[10px] font-semibold uppercase tracking-wider">Início</span>
</div>
<div class="flex flex-col items-center justify-center bg-[#2C2420] text-[#C4707E] rounded-2xl px-3 py-1.5 active:scale-90 transition-transform duration-200">
<span class="material-symbols-outlined mb-1" data-icon="calculate" style="font-variation-settings: 'FILL' 1;">calculate</span>
<span class="font-sans text-[10px] font-semibold uppercase tracking-wider">Cálculos</span>
</div>
<div class="flex flex-col items-center justify-center text-[#8B7355] dark:text-[#F5E1DB]/50 opacity-70 hover:text-[#C4707E] transition-colors">
<span class="material-symbols-outlined mb-1" data-icon="history">history</span>
<span class="font-sans text-[10px] font-semibold uppercase tracking-wider">Histórico</span>
</div>
<div class="flex flex-col items-center justify-center text-[#8B7355] dark:text-[#F5E1DB]/50 opacity-70 hover:text-[#C4707E] transition-colors">
<span class="material-symbols-outlined mb-1" data-icon="lightbulb">lightbulb</span>
<span class="font-sans text-[10px] font-semibold uppercase tracking-wider">Dicas</span>
</div>
<div class="flex flex-col items-center justify-center text-[#8B7355] dark:text-[#F5E1DB]/50 opacity-70 hover:text-[#C4707E] transition-colors">
<span class="material-symbols-outlined mb-1" data-icon="person">person</span>
<span class="font-sans text-[10px] font-semibold uppercase tracking-wider">Perfil</span>
</div>
</nav>
</body></html>
