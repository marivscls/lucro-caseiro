<!DOCTYPE html>

<html class="dark" lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&amp;family=Quicksand:wght@300;400;500;600;700&amp;family=Poppins:wght@600;700&amp;family=Noto+Serif:wght@400;700&amp;family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "inverse-on-surface": "#f9efea",
              "on-tertiary-fixed-variant": "#624000",
              "secondary": "#864e58",
              "on-primary-fixed": "#3d0414",
              "surface-dim": "#e1d8d3",
              "surface-container": "#f6ece7",
              "on-primary-fixed-variant": "#75303e",
              "secondary-fixed": "#ffd9de",
              "surface-container-highest": "#eae1dc",
              "on-tertiary-container": "#fffbff",
              "error": "#ba1a1a",
              "tertiary-container": "#996c25",
              "on-surface-variant": "#534345",
              "surface-tint": "#924755",
              "on-background": "#1f1b18",
              "surface-bright": "#fff8f5",
              "on-secondary": "#ffffff",
              "primary": "#8f4552",
              "surface-variant": "#eae1dc",
              "on-error-container": "#93000a",
              "on-surface": "#1f1b18",
              "on-secondary-fixed": "#360d17",
              "tertiary-fixed-dim": "#f4bd6e",
              "outline": "#867274",
              "primary-container": "#ac5d6a",
              "on-primary-container": "#fffbff",
              "on-tertiary": "#ffffff",
              "inverse-surface": "#342f2c",
              "surface-container-low": "#fcf2ed",
              "on-primary": "#ffffff",
              "secondary-fixed-dim": "#fbb3bf",
              "error-container": "#ffdad6",
              "surface-container-high": "#f0e6e1",
              "primary-fixed-dim": "#ffb2bd",
              "on-secondary-fixed-variant": "#6b3741",
              "secondary-container": "#feb6c1",
              "background": "#fff8f5",
              "surface": "#fff8f5",
              "outline-variant": "#d8c1c3",
              "on-error": "#ffffff",
              "tertiary-fixed": "#ffddb2",
              "surface-container-lowest": "#ffffff",
              "primary-fixed": "#ffd9dd",
              "on-tertiary-fixed": "#291800",
              "tertiary": "#7d540c",
              "inverse-primary": "#ffb2bd",
              "on-tertiary": "#ffffff"
            },
            fontFamily: {
              "headline": ["Noto Serif", "serif"],
              "body": ["Plus Jakarta Sans", "sans-serif"],
              "label": ["Plus Jakarta Sans", "sans-serif"],
              "serif": ["Playfair Display", "serif"],
              "sans": ["Quicksand", "sans-serif"],
              "mono": ["Poppins", "sans-serif"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "2xl": "1rem", "3xl": "1.5rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        body {
            background-color: #1E1814;
            color: #F5E1DB;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .custom-checkbox:checked {
            background-color: #C4707E;
            border-color: #C4707E;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-sans antialiased min-h-screen flex items-center justify-center p-6 selection:bg-[#C4707E]/30">
<main class="w-full max-w-md mx-auto space-y-10">
<!-- Illustration Section -->
<div class="relative flex justify-center mb-2">
<div class="w-32 h-32 relative bg-[#2C2420] rounded-full flex items-center justify-center overflow-hidden">
<img alt="Ilustração do negócio" class="z-10 w-16 h-16 opacity-90" data-alt="flat vector illustration of a dark smartphone displaying a rising pink growth chart surrounded by delicate hand-drawn botanical flowers and leaves in warm tones" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAc1OFdHnxG-nq8jd7aIFI6AnDV2aOwWttdVhdhJo-n2kMdeyjVim9kguoQft9IAKTAgqLZHjn_O75AHelJeK32gQQxxjENOzVcoIH2859EI9rz5fRU-AXoPKa2GnJrxSMqZ_fiBdQwAH25AtNsu6HoWYQmeGXfiivjOba1dscoo-rougyTWNej692Zq2aEu5-2hjUc-FSbgKGg-gwCYTeRsCP5KyepA8X_syuhSddHzA5UJxkCsAKFQyyIjH_aYGAFhsbf8oezSNk"/>
<!-- Organic Decorative Elements -->
<div class="absolute -bottom-2 -right-2 w-16 h-16 opacity-40">
<span class="material-symbols-outlined text-[#C4707E] text-4xl">local_florist</span>
</div>
<div class="absolute -top-1 -left-1 w-12 h-12 opacity-30">
<span class="material-symbols-outlined text-[#8B7355] text-3xl">psychiatry</span>
</div>
</div>
</div>
<!-- Header -->
<header class="text-center space-y-3">
<h1 class="font-serif text-4xl font-bold tracking-tight text-[#F5E1DB]">
                Crie sua conta
            </h1>
<p class="font-sans text-[#8B7355] text-lg font-medium leading-relaxed">
                Comece a organizar seu negócio
            </p>
</header>
<!-- Registration Form -->
<form class="space-y-8">
<div class="space-y-6">
<!-- Name Input -->
<div class="group">
<label class="block font-serif text-[#8B7355] text-sm mb-2 ml-1 transition-colors group-focus-within:text-[#C4707E]">
                        Seu nome
                    </label>
<input class="w-full bg-[#2C2420] border-none rounded-[12px] px-5 py-4 text-[#F5E1DB] focus:ring-2 focus:ring-[#C4707E]/50 transition-all placeholder:text-[#8B7355]/40" placeholder="Ex: Maria Oliveira" type="text"/>
</div>
<!-- Email Input -->
<div class="group">
<label class="block font-serif text-[#8B7355] text-sm mb-2 ml-1 transition-colors group-focus-within:text-[#C4707E]">
                        E-mail
                    </label>
<input class="w-full bg-[#2C2420] border-none rounded-[12px] px-5 py-4 text-[#F5E1DB] focus:ring-2 focus:ring-[#C4707E]/50 transition-all placeholder:text-[#8B7355]/40" placeholder="seu@email.com" type="email"/>
</div>
<!-- Password Input -->
<div class="group">
<label class="block font-serif text-[#8B7355] text-sm mb-2 ml-1 transition-colors group-focus-within:text-[#C4707E]">
                        Senha
                    </label>
<div class="relative">
<input class="w-full bg-[#2C2420] border-none rounded-[12px] px-5 py-4 text-[#F5E1DB] focus:ring-2 focus:ring-[#C4707E]/50 transition-all placeholder:text-[#8B7355]/40" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-[#8B7355]" type="button">
<span class="material-symbols-outlined text-xl">visibility_off</span>
</button>
</div>
</div>
<!-- Business Name Input -->
<div class="group">
<label class="block font-serif text-[#8B7355] text-sm mb-2 ml-1 transition-colors group-focus-within:text-[#C4707E]">
                        Nome do negócio
                    </label>
<input class="w-full bg-[#2C2420] border-none rounded-[12px] px-5 py-4 text-[#F5E1DB] focus:ring-2 focus:ring-[#C4707E]/50 transition-all placeholder:text-[#8B7355]/40" placeholder="Ex: Confeitaria da Lu" type="text"/>
</div>
</div>
<!-- Terms and Conditions -->
<div class="flex items-center space-x-3 px-1">
<input class="w-5 h-5 rounded-md border-none bg-[#2C2420] text-[#C4707E] focus:ring-offset-[#1E1814] focus:ring-[#C4707E] cursor-pointer" id="terms" type="checkbox"/>
<label class="font-sans text-sm text-[#8B7355] cursor-pointer select-none" for="terms">
                    Li e aceito os <span class="text-[#F5E1DB] underline underline-offset-4">Termos</span>
</label>
</div>
<!-- Action Buttons -->
<div class="pt-4 space-y-6 text-center">
<button class="w-full bg-[#C4707E] text-[#FFF5F0] py-4 rounded-[16px] font-sans font-bold text-lg hover:brightness-110 active:scale-[0.98] transition-all" type="submit">
                    Criar minha conta
                </button>
<a class="inline-block text-[#C4707E] font-sans font-semibold text-sm hover:text-[#D4919C] transition-colors underline-offset-4 decoration-2" href="#">
                    Já tem conta? Entrar
                </a>
</div>
</form>
<!-- Aesthetic Footer Token -->
<footer class="pt-12 flex justify-center opacity-20">
<span class="material-symbols-outlined text-[#8B7355] text-2xl">bakery_dining</span>
</footer>
</main>
</body></html>
