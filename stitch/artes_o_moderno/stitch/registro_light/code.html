<body class="bg-brand-creme min-h-screen flex flex-col items-center justify-center p-6 selection:bg-brand-rosa-cha/20">
<main class="w-full max-w-md mx-auto space-y-8">
<!-- Header Section with Illustration -->
<header class="flex flex-col items-center text-center space-y-4">
<div class="relative w-32 h-32 mb-2">
<!-- Decorative organic blobs -->
<div class="absolute inset-0 bg-brand-surface rounded-full blur-2xl opacity-40"></div>
<img alt="Ilustração artesanal" class="relative z-10 w-full h-full object-contain mix-blend-multiply opacity-90" data-alt="flat minimalist illustration of a smartphone showing a rising growth chart surrounded by delicate hand-drawn flowers and leaves in earthy tones" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBylIUMbrJaxZwKdrKyuhuTdgdCfJSwA89kDsWb8v6jfxTNbXH1g1Uzg8zLZ6ypR5i9CeJWAhvhREA1aWNEs_cXf-fuc16T14oD5axqKyL7zHd32WcCiP6G0MYNuB528H00ZUndxxLlC7f6e1k194tkMRnYOyNPFOToHLF_E9C8JV59ZKETOTKgLe-Q2DUd_nwt_0JNabevQnjFM8E-W9HOBX9raXmmNHByY0G9QqQDWxjCh_D7jg-RnCpeP2Yey8pHCf_ZYf8v5gE"/>
</div>
<div class="space-y-1">
<h1 class="serif-text text-4xl font-bold text-brand-warm-brown tracking-tight">Crie sua conta</h1>
<p class="text-brand-light-brown text-lg font-medium">Comece a organizar seu negocio</p>
</div>
</header>
<!-- Registration Form -->
<form class="space-y-6">
<div class="space-y-5">
<!-- Name Field -->
<div class="space-y-1.5">
<label class="serif-text block text-sm font-semibold text-brand-light-brown ml-1">Seu nome</label>
<input class="w-full px-5 py-4 bg-white border-none rounded-[12px] shadow-sm ring-1 ring-black/[0.03] focus:ring-2 focus:ring-brand-rosa-cha/30 outline-none transition-all placeholder:text-brand-light-brown/40 text-brand-warm-brown" placeholder="Como devemos te chamar?" type="text"/>
</div>
<!-- Email Field -->
<div class="space-y-1.5">
<label class="serif-text block text-sm font-semibold text-brand-light-brown ml-1">E-mail</label>
<input class="w-full px-5 py-4 bg-white border-none rounded-[12px] shadow-sm ring-1 ring-black/[0.03] focus:ring-2 focus:ring-brand-rosa-cha/30 outline-none transition-all placeholder:text-brand-light-brown/40 text-brand-warm-brown" placeholder="exemplo@email.com" type="email"/>
</div>
<!-- Business Name Field -->
<div class="space-y-1.5">
<label class="serif-text block text-sm font-semibold text-brand-light-brown ml-1">Nome do negocio</label>
<input class="w-full px-5 py-4 bg-white border-none rounded-[12px] shadow-sm ring-1 ring-black/[0.03] focus:ring-2 focus:ring-brand-rosa-cha/30 outline-none transition-all placeholder:text-brand-light-brown/40 text-brand-warm-brown" placeholder="O nome da sua marca" type="text"/>
</div>
<!-- Password Field -->
<div class="space-y-1.5 relative">
<label class="serif-text block text-sm font-semibold text-brand-light-brown ml-1">Senha</label>
<div class="relative">
<input class="w-full px-5 py-4 bg-white border-none rounded-[12px] shadow-sm ring-1 ring-black/[0.03] focus:ring-2 focus:ring-brand-rosa-cha/30 outline-none transition-all placeholder:text-brand-light-brown/40 text-brand-warm-brown" placeholder="Mínimo 8 caracteres" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-brand-light-brown/60 hover:text-brand-rosa-cha transition-colors" type="button">
<span class="material-symbols-outlined text-lg" data-icon="visibility">visibility</span>
</button>
</div>
</div>
</div>
<!-- Terms and Conditions -->
<div class="flex items-center space-x-3 px-1">
<div class="relative flex items-center">
<input class="peer h-5 w-5 rounded-md border-brand-rosa-cha/30 text-brand-rosa-cha focus:ring-brand-rosa-cha/20 transition-all cursor-pointer" id="terms" type="checkbox"/>
</div>
<label class="text-sm text-brand-light-brown cursor-pointer select-none" for="terms">
                    Li e aceito os <span class="text-brand-rosa-cha font-semibold hover:underline">Termos</span>
</label>
</div>
<!-- Action Button -->
<div class="pt-2">
<button class="w-full py-4 px-6 bg-[#C4707E] text-[#FFF5F0] font-bold text-lg rounded-[16px] shadow-lg shadow-brand-rosa-cha/20 hover:bg-[#b06370] active:scale-[0.98] transition-all flex items-center justify-center space-x-2" type="submit">
<span>Criar minha conta</span>
<span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</form>
<!-- Footer Link -->
<footer class="text-center pb-8">
<p class="text-brand-light-brown font-medium">
                Ja tem conta? 
                <a class="text-brand-rosa-cha font-bold ml-1 hover:underline decoration-brand-rosa-cha/30 underline-offset-4" href="#">Entrar</a>
</p>
</footer>
</main>
<!-- Decorative Elements (Asymmetric Organic Feel) -->
<div class="fixed -bottom-12 -left-12 w-48 h-48 opacity-20 pointer-events-none">
<img alt="Organic detail" class="w-full h-full object-cover rounded-full" data-alt="Close-up of dried botanicals and soft cotton flowers on a creamy textured surface with soft shadows" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCbfzDR3qB5sXxzqrpIbPscGlYsIF0iav5FH-Vv6ZxHAjYUWO_dZR175aXUxvvU8aNqw-5YtVeyOFqMaC0cZawWT2SqUl7YM4BiIsQbie7XPyRw606sHVZxUvu0r4h2APf48iFmTum4uxp5LAR5P4kZg62ZOdAmKAAcUFgY2RBmZnOoVnZhWPAMK9rAZLr4NRjiaRsPiZ0xRdrxfZD20qLTHtg_m-izg0H8TlYSCwsFKOTsiUwZ8e4rXLKH5VGrtcgsmYrl79XI0IE"/>
</div>

</div>
</body></html>
