            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;

            line-height: 1;
            text-transform: none;
            letter-spacing: normal;
            word-wrap: normal;
            white-space: nowrap;
            direction: ltr;
        }
        body {
            background-color: #1E1814;
        }

    body {
      min-height: max(884px, 100dvh);

<div class="w-full max-w-md flex flex-col items-center text-center">
<!-- Celebration Illustration Area -->
<div class="relative w-full aspect-square mb-12 flex items-center justify-center">
<!-- Stacked Tonal Layers for Organic Feel -->
<div class="absolute inset-0 bg-[#2C2420] rounded-[48px] rotate-3 scale-95 opacity-50"></div>
<div class="absolute inset-0 bg-[#2C2420] rounded-[48px] -rotate-2"></div>
<div class="relative z-10 p-8 w-full h-full flex flex-col items-center justify-center">
<img alt="Celebration illustration" class="w-full h-full object-cover rounded-[32px] mix-blend-lighten opacity-90" data-alt="Artisanal pastry chef holding a beautifully decorated cake in a dimly lit, warm cocoa-toned professional kitchen with soft golden fairy lights" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAXVhl1ZmUGrKJtSA50s0LvelO_zvDff-2Lbil0twLbsHMKcQWRZSdVxNnLpk7bIbw2j9ZYj36-R-ZHRDvVz6wdtLgUybYD18WaDdqD1iUTZJ9HaiS7Sq4VsuPP882SYUDC5fM7kyG3G4wcaXqvTBH9g6x967V7bvqF_O5zao9Rb6rKhMYY6wfFz4MnaxCFUPUJBVR8IzwcTDEghZXS9Tth1KBgxj4zjhfvvGaGEUYpjYk2vOzm6j81NW9YnJkqrNQNQunPmH_kfwU"/>

<div class="absolute -bottom-4 -right-4 bg-[#C4707E] p-4 rounded-2xl shadow-2xl scale-110">
<span class="material-symbols-outlined text-white text-4xl" style="font-variation-settings: 'FILL' 1;">auto_awesome</span>
</div>
</div>
</div>
<!-- Typography Header -->
<div class="space-y-4 mb-12">
<h1 class="font-serif italic text-5xl md:text-6xl text-[#F5E1DB] tracking-tight leading-tight">
                    Tudo pronto
                </h1>
<p class="font-sans text-[#8B7355] text-lg max-w-[280px] mx-auto leading-relaxed">
                    Sua jornada para um ateliê lucrativo e organizado começa agora.
                </p>
</div>
<!-- Dashboard Preview Bento-ish Hint -->
<div class="w-full grid grid-cols-2 gap-4 mb-16 opacity-80">
<div class="bg-[#2C2420] p-4 rounded-2xl text-left border border-[#F5E1DB]/5">
<span class="material-symbols-outlined text-[#C4707E] mb-2">payments</span>
<div class="font-numeric text-xl font-bold text-[#F5E1DB]">R$ 0,00</div>
<div class="text-[10px] uppercase tracking-widest text-[#8B7355] font-sans">Vendas Hoje</div>
</div>
<div class="bg-[#2C2420] p-4 rounded-2xl text-left border border-[#F5E1DB]/5">
<span class="material-symbols-outlined text-[#6BBF96] mb-2">inventory_2</span>
<div class="font-numeric text-xl font-bold text-[#F5E1DB]">Pronto</div>
<div class="text-[10px] uppercase tracking-widest text-[#8B7355] font-sans">Estoque Inicial</div>
</div>
</div>

<button class="group w-full bg-[#C4707E] hover:bg-[#b0616d] active:scale-95 transition-all duration-300 py-6 px-8 rounded-2xl flex items-center justify-center gap-3">
<span class="font-sans font-bold text-white text-lg tracking-wide">Comecar a usar</span>
<span class="material-symbols-outlined text-white group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
<button class="mt-8 text-[#8B7355] font-sans font-medium text-sm hover:text-[#F5E1DB] transition-colors flex items-center gap-2">
                Ver tour guiado
            </button>
</div>
</main>
<!-- Footer Decoration -->
<footer class="h-24 w-full flex items-end justify-center pb-8 overflow-hidden pointer-events-none">
<div class="flex gap-2 opacity-20">
<div class="w-1.5 h-1.5 rounded-full bg-[#C4707E]"></div>
<div class="w-1.5 h-1.5 rounded-full bg-[#C4707E]"></div>
<div class="w-1.5 h-1.5 rounded-full bg-[#C4707E]"></div>
</div>
</footer>

<div class="fixed top-8 left-1/2 -translate-x-1/2 w-[90%] max-w-sm z-50">
<div class="bg-[#2C2420]/70 backdrop-blur-xl rounded-2xl px-6 py-4 flex items-center gap-4 border border-white/5 shadow-2xl">
<div class="bg-[#6BBF96]/20 p-2 rounded-full">
<span class="material-symbols-outlined text-[#6BBF96] text-xl" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
<div class="flex flex-col">
<span class="text-[#F5E1DB] text-sm font-bold font-sans">Perfil ativado</span>
<span class="text-[#8B7355] text-xs font-sans">Configurações salvas com sucesso</span>
</div>
</div>
