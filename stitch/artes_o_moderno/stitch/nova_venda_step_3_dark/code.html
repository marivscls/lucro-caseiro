<!DOCTYPE html>

<html class="dark" lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Nova Venda - Lucro Caseiro</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&amp;family=Quicksand:wght@400;500;600;700&amp;family=Poppins:wght@600&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#C4707E",
              "secondary": "#D4919C",
              "background": "#1E1814",
              "surface": "#2C2420",
              "surface-active": "#3D322C",
              "text-main": "#F5E1DB",
              "text-sub": "#8B7355",
              "accent-blue": "#89A5B5",
              "accent-green": "#6BBF96",
              "accent-lavender": "#B8A9D4",
              "accent-gold": "#D4A054",
            },
            fontFamily: {
              "headline": ["Playfair Display", "serif"],
              "body": ["Quicksand", "sans-serif"],
              "data": ["Poppins", "sans-serif"]
            },
            borderRadius: {
              "card": "20px",
              "xl": "24px"
            }
          },
        },
      }
    </script>
<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      body {
        background-color: #1E1814;
        color: #F5E1DB;
        font-family: 'Quicksand', sans-serif;
      }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="flex items-center justify-between w-full px-6 py-4 bg-[#1E1814] fixed top-0 z-50">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-[#D4919C] hover:opacity-80 transition-opacity cursor-pointer">close</span>
<h1 class="font-['Playfair_Display'] text-xl font-bold text-[#F5E1DB]">Nova Venda</h1>
</div>
<!-- Progress Dots -->
<div class="flex gap-2">
<div class="w-2 h-2 rounded-full bg-[#8B7355]/40"></div>
<div class="w-2 h-2 rounded-full bg-[#8B7355]/40"></div>
<div class="w-2 h-2 rounded-full bg-[#C4707E]"></div>
<div class="w-2 h-2 rounded-full bg-[#8B7355]/40"></div>
</div>
</header>
<main class="flex-1 mt-20 px-6 pb-32 max-w-lg mx-auto w-full">
<!-- Editorial Header -->
<div class="mb-10">
<h2 class="font-['Playfair_Display'] text-4xl font-bold text-[#F5E1DB] tracking-tight leading-tight">
                Como vai<br/>receber?
            </h2>
<p class="text-[#8B7355] mt-2 font-medium">Escolha a forma de pagamento do cliente</p>
</div>
<!-- Payment Grid -->
<div class="grid grid-cols-2 gap-4">
<!-- Card 1 (Selected) -->
<button class="flex flex-col items-center justify-center p-6 bg-[#3D322C] rounded-[20px] relative group transition-all duration-200 ring-2 ring-[#C4707E]">
<div class="absolute top-3 right-3">
<span class="material-symbols-outlined text-[#C4707E] text-xl" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
<div class="w-14 h-14 rounded-full bg-[#89A5B5]/10 flex items-center justify-center mb-3">
<span class="material-symbols-outlined text-[#89A5B5] text-3xl">smartphone</span>
</div>
<span class="font-semibold text-[#F5E1DB]">Pix</span>
</button>
<!-- Card 2 -->
<button class="flex flex-col items-center justify-center p-6 bg-[#2C2420] rounded-[20px] group hover:bg-[#3D322C] transition-all duration-200">
<div class="w-14 h-14 rounded-full bg-[#6BBF96]/10 flex items-center justify-center mb-3">
<span class="material-symbols-outlined text-[#6BBF96] text-3xl">payments</span>
</div>
<span class="font-semibold text-[#F5E1DB]">Dinheiro</span>
</button>
<!-- Card 3 -->
<button class="flex flex-col items-center justify-center p-6 bg-[#2C2420] rounded-[20px] group hover:bg-[#3D322C] transition-all duration-200">
<div class="w-14 h-14 rounded-full bg-[#B8A9D4]/10 flex items-center justify-center mb-3">
<span class="material-symbols-outlined text-[#B8A9D4] text-3xl">credit_card</span>
</div>
<span class="font-semibold text-[#F5E1DB]">Cartão</span>
</button>
<!-- Card 4 -->
<button class="flex flex-col items-center justify-center p-6 bg-[#2C2420] rounded-[20px] group hover:bg-[#3D322C] transition-all duration-200">
<div class="w-14 h-14 rounded-full bg-[#D4A054]/10 flex items-center justify-center mb-3">
<span class="material-symbols-outlined text-[#D4A054] text-3xl">schedule</span>
</div>
<span class="font-semibold text-[#F5E1DB]">Fiado</span>
</button>
<!-- Card 5 -->
<button class="flex flex-col items-center justify-center p-6 bg-[#2C2420] rounded-[20px] group hover:bg-[#3D322C] transition-all duration-200 col-span-2">
<div class="w-14 h-14 rounded-full bg-[#89A5B5]/10 flex items-center justify-center mb-3">
<span class="material-symbols-outlined text-[#89A5B5] text-3xl">account_balance</span>
</div>
<span class="font-semibold text-[#F5E1DB]">Transferência</span>
</button>
</div>
<!-- Decorative Illustration Element -->
<div class="mt-12 opacity-20 pointer-events-none flex justify-center">
<img alt="Organic baker icon" class="w-32 h-32 object-contain" data-alt="Minimalist flat illustration of a hand-drawn whisk and organic flour sack with soft textures in earthy tones" src="https://lh3.googleusercontent.com/aida-public/AB6AXuArDbs52Fy6C9fxuo6fS_j0htX87QkKFLyr72SWD7bybAWIwOLOi8ydKLOmlY6pOivWuQr-Idk3Zxm0GdtYJEJkL161VzqGHPsP3jegop7GuDGsW33mdgspomzlhPrsjNBoSWLBPkxUxRtm6y3kPupcU7m796YL2shV6ywHnnE93Vqnw-wlPQ5l63dsYL92QTL3jEgntTiPussSwXa8h0Gkxk60m5kxR8hTW6BSA627_6FD7Kheub9-anjCUcgnQejMGhLUegWMj_g"/>
</div>
</main>
<!-- Bottom Action Area -->
<div class="fixed bottom-0 left-0 w-full p-6 bg-gradient-to-t from-[#1E1814] via-[#1E1814] to-transparent">
<button class="w-full bg-[#C4707E] text-white font-bold py-4 rounded-xl flex items-center justify-center gap-2 active:scale-95 transition-transform duration-200">
            Proximo
            <span class="material-symbols-outlined">arrow_forward</span>
</button>
</div>
<!-- BottomNavBar (Hidden in Focus Journey) -->
<!-- Navigation is suppressed for Task-Focused screens -->
</body></html>
