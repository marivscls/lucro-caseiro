<!DOCTYPE html>

<html class="light" lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>

              "surface-bright": "#fff8f5",

              "on-secondary-fixed-variant": "#6b3741",

              "inverse-surface": "#342f2c",

              "outline": "#867274",
              "on-surface-variant": "#534345",
              "surface-container": "#f6ece7"

            fontFamily: {

              "serif-display": ["Playfair Display", "serif"],
              "body": ["Plus Jakarta Sans", "sans-serif"],
              "label": ["Quicksand", "sans-serif"]

            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "2xl": "1rem", "3xl": "1.5rem", "full": "9999px"},
          },

      }

<style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .font-serif-display { font-family: 'Playfair Display', serif; }
        .font-label { font-family: 'Quicksand', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-[#FFF5F0] text-[#4A3228] min-h-screen flex flex-col overflow-hidden">
<!-- TopAppBar Suppressed (Transactional/Onboarding Page) -->
<main class="flex-grow flex flex-col items-center justify-center px-8 relative">
<!-- Organic Background Elements (Asymmetric) -->
<div class="absolute top-[-10%] left-[-5%] w-64 h-64 bg-[#F5E1DB] rounded-full blur-3xl opacity-40"></div>
<div class="absolute bottom-[5%] right-[-10%] w-80 h-80 bg-[#D4919C] rounded-full blur-[100px] opacity-20"></div>
<!-- Celebration Composition (Asymmetric Illustration Card) -->
<div class="relative w-full max-w-md aspect-square flex items-center justify-center mb-12">
<!-- Glassmorphism Container for Illustration -->
<div class="absolute inset-0 bg-[#F5E1DB]/50 backdrop-blur-xl rounded-[40px] z-0"></div>
<div class="relative z-10 w-full h-full flex items-center justify-center overflow-hidden rounded-[40px]">
<!-- Main Rocket Illustration -->
<div class="transform -rotate-12 hover:rotate-0 transition-transform duration-700">
<img alt="Rocket launch" class="w-48 h-48 drop-shadow-2xl" data-alt="A stylized pink and cream flat illustration of a rocket ship taking off diagonally amidst floating golden stars and pastel confetti" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDkUSiQ-I2w2qMMNlNWLYzNZN5XOL3YjV8knVFzytsxGg7fp0PyVrqP22jSp8HM_hzQY-YiSfh8xGi-Hi8ByrchFu3whq4sMmtEJ92Fi1GMX7iv6eRYbozW8k4W_L4uobwHGsFKPFWRodOtnovStDQ2MeCaa6FlwYLQ-hD481lroNDsE6Lr9twmnLnUt7WEOvk57Y7cq-Cto-QzYEKXSZ1KQ6hjZIthAMiGIk3s_q4fxfmTI2eU4M2FX49ZTwYm1PD7erOJTsxKh4I"/>
</div>
<!-- Floating Elements (Simulated Asymmetric Confetti/Stars) -->
<span class="material-symbols-outlined absolute top-12 left-16 text-[#D4A054] text-3xl" style="font-variation-settings: 'FILL' 1;">star</span>
<span class="material-symbols-outlined absolute bottom-20 right-12 text-[#C4707E] text-2xl" style="font-variation-settings: 'FILL' 1;">auto_awesome</span>
<span class="material-symbols-outlined absolute top-20 right-20 text-[#B8A9D4] text-xl" style="font-variation-settings: 'FILL' 1;">celebration</span>
<span class="material-symbols-outlined absolute bottom-12 left-24 text-[#6BBF96] text-lg" style="font-variation-settings: 'FILL' 1;">favorite</span>
<!-- Decorative Tonal Blobs inside the card -->
<div class="absolute -bottom-10 -right-10 w-40 h-40 bg-[#C4707E]/10 rounded-full"></div>
</div>
</div>
<!-- Editorial Content -->
<div class="text-center max-w-sm space-y-6 z-20">
<h1 class="font-serif-display italic text-5xl md:text-6xl text-[#4A3228] tracking-tight leading-tight">
                Tudo pronto!
            </h1>
<p class="font-label text-lg text-[#8B7355] leading-relaxed px-4">
                Agora é só registrar suas vendas e acompanhar seus lucros
            </p>
</div>
<!-- Tactile Primary Action -->
<div class="mt-16 w-full max-w-xs z-20">
<button class="w-full bg-[#C4707E] text-white font-label font-bold py-5 px-8 rounded-[24px] text-xl flex items-center justify-center gap-3 transition-all active:scale-95 hover:bg-[#B05B69]">
                Começar a usar
                <span class="material-symbols-outlined">arrow_forward</span>
</button>
</div>
<!-- Soft Page Indicator / Progress (Subtle Layering) -->
<div class="mt-12 flex gap-2">
<div class="w-2 h-2 rounded-full bg-[#D4919C]/30"></div>
<div class="w-2 h-2 rounded-full bg-[#D4919C]/30"></div>
<div class="w-2 h-2 rounded-full bg-[#D4919C]/30"></div>
<div class="w-8 h-2 rounded-full bg-[#C4707E]"></div>
</div>
</main>
<!-- Navigation Suppressed for Success/Transactional Flow -->
</body></html>
