<!DOCTYPE html>

<html class="dark" lang="pt-br"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,400;0,700;1,400&amp;family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;family=Poppins:wght@700&amp;family=Quicksand:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "outline-variant": "#d8c1c3",
              "surface-container-low": "#fcf2ed",
              "surface-container": "#f6ece7",
              "secondary-container": "#feb6c1",
              "tertiary-container": "#996c25",
              "on-secondary-fixed": "#360d17",
              "tertiary-fixed": "#ffddb2",
              "on-primary-container": "#fffbff",
              "error-container": "#ffdad6",
              "on-primary-fixed": "#3d0414",
              "secondary-fixed": "#ffd9de",
              "on-error-container": "#93000a",
              "on-secondary-fixed-variant": "#6b3741",
              "surface-container-lowest": "#ffffff",
              "primary-fixed": "#ffd9dd",
              "surface": "#fff8f5",
              "on-error": "#ffffff",
              "surface-container-highest": "#eae1dc",
              "surface-container-high": "#f0e6e1",
              "background": "#fff8f5",
              "inverse-on-surface": "#f9efea",
              "primary-container": "#ac5d6a",
              "inverse-primary": "#ffb2bd",
              "tertiary": "#7d540c",
              "primary-fixed-dim": "#ffb2bd",
              "surface-variant": "#eae1dc",
              "secondary-fixed-dim": "#fbb3bf",
              "primary": "#8f4552",
              "surface-tint": "#924755",
              "tertiary-fixed-dim": "#f4bd6e",
              "secondary": "#864e58",
              "on-surface-variant": "#534345",
              "surface-dim": "#e1d8d3",
              "on-secondary": "#ffffff",
              "on-tertiary-fixed-variant": "#624000",
              "error": "#ba1a1a",
              "inverse-surface": "#342f2c",
              "surface-bright": "#fff8f5",
              "on-tertiary": "#ffffff",
              "on-surface": "#1f1b18",
              "on-background": "#1f1b18",
              "on-tertiary-container": "#fffbff",
              "on-primary": "#ffffff",
              "on-primary-fixed-variant": "#75303e",
              "outline": "#867274",
              "on-tertiary-fixed": "#291800",
              "on-secondary-container": "#7a444e"
            },
            fontFamily: {
              "headline": ["Noto Serif"],
              "body": ["Quicksand"],
              "label": ["Plus Jakarta Sans"],
              "data": ["Poppins"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        body {
            background-color: #1E1814;
            color: #F5E1DB;
            font-family: 'Quicksand', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 0px;
            display: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="min-h-screen flex flex-col items-center">
<!-- TopAppBar -->
<header class="fixed top-0 left-0 w-full z-50 bg-[#1E1814]">
<div class="flex justify-between items-center w-full px-6 py-4 max-w-screen-xl mx-auto">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full overflow-hidden bg-[#2C2420] flex items-center justify-center">
<img alt="Small business owner" class="w-full h-full object-cover" data-alt="Close-up portrait of a warm and smiling artisan business owner in a cozy kitchen setting with soft lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAt5xO1Lro9ZQ6ZB2B6vSX2JvJP73gCzxFXZN5i4bPM5JVjZHJNCeUT8ItM5bgFIryaUnM6VZuFRtRfB1YRCCnIAQyU1BUgLs6etch9Dgz6UEEjle9joUZ-LlNq17vKVMvFsidfB7ry1D-nxuij6RwL1dEdEVGnO-W0YN7vG42ewS1kFQXupPHMZP8a4n3m_iddNkWb1aBmfuIddEd3XVpRRM341cvAYjRwWr1KaQezrTIcFjJR0-xz1ATmmVLP7PhONt2AElXEybI"/>
</div>
<h1 class="font-headline italic text-[#D4919C] text-xl">Atelier Finance</h1>
</div>
<button class="text-[#D4919C] hover:opacity-80 transition-opacity active:scale-95 duration-150">
<span class="material-symbols-outlined" data-icon="notifications">notifications</span>
</button>
</div>
<div class="bg-[#2C2420] h-px w-full opacity-20"></div>
</header>
<main class="w-full max-w-lg px-6 pt-24 pb-32 flex flex-col gap-10">
<!-- Screen Title Section -->
<section class="flex flex-col gap-2">
<h2 class="font-headline text-4xl text-[#F5E1DB] tracking-tight">Novo lancamento</h2>
<p class="text-[#8B7355] text-sm font-label">Registre sua movimentação de hoje no Lucro Caseiro.</p>
</section>
<!-- Transaction Toggle -->
<section class="flex justify-center p-1 bg-[#2C2420] rounded-2xl">
<button class="flex-1 py-3 rounded-xl bg-[#6BBF96]/20 text-[#6BBF96] font-semibold text-sm transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-lg" data-icon="arrow_upward">arrow_upward</span>
                Entrada
            </button>
<button class="flex-1 py-3 rounded-xl text-[#8B7355] font-semibold text-sm hover:text-[#E07272] transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-lg" data-icon="arrow_downward">arrow_downward</span>
                Saida
            </button>
</section>
<!-- Value Input Card -->
<section class="bg-[#2C2420] rounded-[24px] p-8 flex flex-col items-center justify-center gap-2 relative overflow-hidden">
<div class="absolute -bottom-6 -right-6 opacity-10 pointer-events-none">
<span class="material-symbols-outlined text-9xl text-[#F5E1DB]" data-icon="payments">payments</span>
</div>
<span class="text-[#8B7355] font-headline text-lg italic">Valor do registro</span>
<div class="flex items-baseline gap-2">
<span class="font-data text-[#D4919C] text-2xl">R$</span>
<input class="bg-transparent border-none text-center focus:ring-0 font-data text-5xl text-[#F5E1DB] p-0 w-full max-w-[200px]" placeholder="0,00" type="text" value="0,00"/>
</div>
</section>
<!-- Form Details -->
<section class="flex flex-col gap-8">
<!-- Description -->
<div class="flex flex-col gap-3">
<label class="font-headline text-[#8B7355] text-lg italic px-1">Descricao do item</label>
<div class="bg-[#2C2420] rounded-[16px] px-5 py-4 flex items-center gap-4">
<span class="material-symbols-outlined text-[#8B7355]" data-icon="edit_note">edit_note</span>
<input class="bg-transparent border-none focus:ring-0 text-[#F5E1DB] font-body placeholder-[#8B7355]/50 w-full p-0" placeholder="Ex: Venda de Bolo de Rolo" type="text"/>
</div>
</div>
<!-- Categories -->
<div class="flex flex-col gap-4">
<label class="font-headline text-[#8B7355] text-lg italic px-1">Categoria</label>
<div class="flex flex-wrap gap-3 overflow-x-auto custom-scrollbar">
<button class="px-5 py-2.5 rounded-[12px] bg-[#C4707E] text-white text-sm font-semibold transition-all whitespace-nowrap">
                        Encomendas
                    </button>
<button class="px-5 py-2.5 rounded-[12px] bg-[#2C2420] text-[#F5E1DB] text-sm font-semibold hover:bg-[#2C2420]/80 transition-all whitespace-nowrap">
                        Pronta Entrega
                    </button>
<button class="px-5 py-2.5 rounded-[12px] bg-[#2C2420] text-[#F5E1DB] text-sm font-semibold hover:bg-[#2C2420]/80 transition-all whitespace-nowrap">
                        Eventos
                    </button>
<button class="px-5 py-2.5 rounded-[12px] bg-[#2C2420] text-[#F5E1DB] text-sm font-semibold hover:bg-[#2C2420]/80 transition-all whitespace-nowrap">
                        Cursos
                    </button>
<button class="w-10 h-10 flex items-center justify-center rounded-[12px] bg-[#2C2420] text-[#8B7355] transition-all">
<span class="material-symbols-outlined" data-icon="add">add</span>
</button>
</div>
</div>
<!-- Date & Extras -->
<div class="grid grid-cols-2 gap-4">
<div class="bg-[#2C2420] rounded-[16px] p-4 flex flex-col gap-1">
<span class="text-[10px] uppercase tracking-wider font-label text-[#8B7355]">Data</span>
<span class="text-[#F5E1DB] font-medium">Hoje, 24 Out</span>
</div>
<div class="bg-[#2C2420] rounded-[16px] p-4 flex flex-col gap-1">
<span class="text-[10px] uppercase tracking-wider font-label text-[#8B7355]">Metodo</span>
<span class="text-[#F5E1DB] font-medium">Pix</span>
</div>
</div>
</section>
<!-- Save Button -->
<button class="w-full bg-[#C4707E] text-white py-5 rounded-[16px] font-semibold text-lg hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-3">
<span class="material-symbols-outlined" data-icon="check_circle">check_circle</span>
            Salvar
        </button>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-6 pt-3 bg-[#1E1814]/70 backdrop-blur-md rounded-t-[32px]">
<button class="flex flex-col items-center justify-center text-[#8B7355] hover:text-[#C4707E] transition-colors px-5 py-2 active:scale-90 duration-200">
<span class="material-symbols-outlined" data-icon="dashboard">dashboard</span>
<span class="font-label font-semibold text-[10px] tracking-wide uppercase mt-1">Overview</span>
</button>
<button class="flex flex-col items-center justify-center text-[#8B7355] hover:text-[#C4707E] transition-colors px-5 py-2 active:scale-90 duration-200">
<span class="material-symbols-outlined" data-icon="receipt_long">receipt_long</span>
<span class="font-label font-semibold text-[10px] tracking-wide uppercase mt-1">Ledger</span>
</button>
<button class="flex flex-col items-center justify-center text-[#D4919C] bg-[#2C2420] rounded-2xl px-5 py-2 active:scale-90 duration-200">
<span class="material-symbols-outlined" data-icon="add_circle" style="font-variation-settings: 'FILL' 1;">add_circle</span>
<span class="font-label font-semibold text-[10px] tracking-wide uppercase mt-1">Register</span>
</button>
<button class="flex flex-col items-center justify-center text-[#8B7355] hover:text-[#C4707E] transition-colors px-5 py-2 active:scale-90 duration-200">
<span class="material-symbols-outlined" data-icon="analytics">analytics</span>
<span class="font-label font-semibold text-[10px] tracking-wide uppercase mt-1">Insights</span>
</button>
</nav>
</body></html>
