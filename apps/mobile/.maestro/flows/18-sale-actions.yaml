# 18 — Ações de venda: abre uma venda existente e cancela. Altera dado real.
# Age numa venda já criada (ex.: as Pix do flow 09), evitando o problema de
# criar-e-agir-em-outra-tela com cache.
appId: br.com.orionseven.lucrocaseiro
name: 18 - Acoes de venda
tags:
  - crud
---
- runFlow:
    file: ../subflows/open-app.yaml
    env:
      EMAIL: "${EMAIL}"
      PASSWORD: "${PASSWORD}"

# Aba Vendas (toque por coordenada no ícone)
- tapOn:
    point: "30%,94%"
- assertVisible: "Todas"

# Abre a primeira venda da lista (card com o produto)
- tapOn: "[e2e] Brigadeiro teste"
- extendedWaitUntil:
    visible:
      text: "Cancelar venda"
    timeout: 8000

# Cancela
- tapOn: "Cancelar venda"
- runFlow:
    when:
      visible: "Sim, cancelar"
    commands:
      - tapOn: "Sim, cancelar"

# Resultado: volta pra lista / status cancelada
- extendedWaitUntil:
    visible:
      text: ".*(cancelada|Cancelada|Todas).*"
    timeout: 10000
- takeScreenshot: .maestro/screenshots/18-venda-acao
