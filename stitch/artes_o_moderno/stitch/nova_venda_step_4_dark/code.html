<!DOCTYPE html>

<html class="dark" lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Nova Venda - Lucro Caseiro</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&amp;family=Quicksand:wght@400;500;600;700&amp;family=Poppins:wght@700&amp;family=Noto+Serif:wght@700&amp;family=Plus+Jakarta+Sans:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "surface-dim": "#e1d8d3",
                        "surface-container-lowest": "#ffffff",
                        "secondary": "#864e58",
                        "on-primary-container": "#fffbff",
                        "surface": "#fff8f5",
                        "on-primary-fixed-variant": "#75303e",
                        "on-error": "#ffffff",
                        "surface-bright": "#fff8f5",
                        "surface-container-highest": "#eae1dc",
                        "on-tertiary-fixed": "#291800",
                        "surface-container-low": "#fcf2ed",
                        "primary": "#8f4552",
                        "background": "#fff8f5",
                        "on-tertiary-fixed-variant": "#624000",
                        "on-secondary": "#ffffff",
                        "primary-container": "#ac5d6a",
                        "inverse-surface": "#342f2c",
                        "inverse-primary": "#ffb2bd",
                        "inverse-on-surface": "#f9efea",
                        "on-primary": "#ffffff",
                        "on-error-container": "#93000a",
                        "secondary-fixed-dim": "#fbb3bf",
                        "outline": "#867274",
                        "primary-fixed": "#ffd9dd",
                        "on-tertiary-container": "#fffbff",
                        "on-surface-variant": "#534345",
                        "on-secondary-fixed": "#360d17",
                        "on-primary-fixed": "#3d0414",
                        "on-surface": "#1f1b18",
                        "error": "#ba1a1a",
                        "secondary-container": "#feb6c1",
                        "on-secondary-container": "#7a444e",
                        "primary-fixed-dim": "#ffb2bd",
                        "on-background": "#1f1b18",
                        "outline-variant": "#d8c1c3",
                        "on-tertiary": "#ffffff",
                        "surface-container": "#f6ece7",
                        "tertiary": "#7d540c",
                        "surface-container-high": "#f0e6e1",
                        "on-secondary-fixed-variant": "#6b3741",
                        "tertiary-container": "#996c25",
                        "secondary-fixed": "#ffd9de",
                        "error-container": "#ffdad6",
                        "tertiary-fixed": "#ffddb2",
                        "surface-variant": "#eae1dc",
                        "tertiary-fixed-dim": "#f4bd6e",
                        "surface-tint": "#924755"
                    },
                    fontFamily: {
                        "headline": ["Noto Serif"],
                        "body": ["Plus Jakarta Sans"],
                        "label": ["Plus Jakarta Sans"],
                        "serif": ["Playfair Display"],
                        "rounded": ["Quicksand"],
                        "data": ["Poppins"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "2xl": "1.25rem", "full": "9999px" },
                },
            },
        }
    </script>
<style>
        body {
            background-color: #1E1814;
            color: #F5E1DB;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .check-filled {
            font-variation-settings: 'FILL' 1;
        }
        .paper-stack {
            background-color: #2C2420;
            position: relative;
            overflow: hidden;
        }
        .illustration-mask {
            position: absolute;
            bottom: -15px;
            right: -10px;
            width: 120px;
            opacity: 0.9;
            z-index: 10;
            pointer-events: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="min-h-screen flex flex-col items-center pb-32">
<!-- Top Navigation Anchor -->
<header class="flex items-center justify-between w-full px-6 py-4 bg-[#FFF5F0] dark:bg-[#1E1814] fixed top-0 z-50">
<button class="text-[#8B7355] hover:opacity-80 transition-opacity scale-95 duration-200">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
<h1 class="font-['Playfair_Display'] text-xl font-bold text-[#4A3228] dark:text-[#F5E1DB]">Nova Venda</h1>
<div class="w-6"></div> <!-- Spacer for symmetry -->
</header>
<main class="w-full max-w-md px-6 pt-24">
<!-- Progress Dots -->
<div class="flex justify-center gap-3 mb-10">
<span class="w-2.5 h-2.5 rounded-full bg-[#8B7355]/30"></span>
<span class="w-2.5 h-2.5 rounded-full bg-[#8B7355]/30"></span>
<span class="w-2.5 h-2.5 rounded-full bg-[#8B7355]/30"></span>
<span class="w-2.5 h-2.5 rounded-full bg-[#C4707E]"></span>
</div>
<!-- Headline -->
<h2 class="font-serif text-3xl text-[#F5E1DB] mb-8 leading-tight tracking-tight text-center">
            Confira sua venda
        </h2>
<!-- Main Transaction Card -->
<div class="paper-stack rounded-2xl p-7 flex flex-col gap-6">
<!-- Items List -->
<div class="flex flex-col gap-5">
<div class="flex items-start justify-between">
<div class="flex gap-3">
<span class="material-symbols-outlined text-[#C4707E] check-filled mt-0.5" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
<div>
<p class="font-rounded font-semibold text-[#F5E1DB] text-lg">Cupcake Rosa x2</p>
<p class="text-[#8B7355] text-sm font-rounded">R$ 7,00</p>
</div>
</div>
</div>
<div class="flex items-start justify-between">
<div class="flex gap-3">
<span class="material-symbols-outlined text-[#C4707E] check-filled mt-0.5" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
<div>
<p class="font-rounded font-semibold text-[#F5E1DB] text-lg">Bolo de Rolo G</p>
<p class="text-[#8B7355] text-sm font-rounded">R$ 28,00</p>
</div>
</div>
</div>
</div>
<!-- Divider -->
<div class="h-[1px] w-full bg-[#F5E1DB]/10"></div>
<!-- Customer & Payment Context -->
<div class="flex flex-col gap-5">
<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-full bg-[#F5E1DB]/5 flex items-center justify-center">
<span class="material-symbols-outlined text-[#D4919C]" data-icon="person">person</span>
</div>
<div>
<p class="text-[#8B7355] text-xs uppercase tracking-widest font-semibold">Cliente</p>
<p class="text-[#F5E1DB] font-rounded font-bold">Maria Luiza</p>
</div>
</div>
<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-full bg-[#F5E1DB]/5 flex items-center justify-center">
<span class="material-symbols-outlined text-[#D4919C]" data-icon="account_balance_wallet">account_balance_wallet</span>
</div>
<div>
<p class="text-[#8B7355] text-xs uppercase tracking-widest font-semibold">Pagamento</p>
<p class="text-[#F5E1DB] font-rounded font-bold">Pagamento via Pix</p>
</div>
</div>
</div>
<!-- Divider -->
<div class="h-[1px] w-full bg-[#F5E1DB]/10"></div>
<!-- Total Section -->
<div class="pt-2">
<p class="font-serif text-[#F5E1DB] text-xl mb-1">Total</p>
<div class="flex items-baseline gap-1">
<span class="text-[#6BBF96] font-data text-4xl leading-none">R$ 35,00</span>
</div>
</div>
<!-- Decorative Illustration (Bag with Check) -->
<div class="illustration-mask">
<div class="relative">
<span class="material-symbols-outlined text-[#F5E1DB]/10 text-8xl" data-icon="shopping_bag">shopping_bag</span>
<div class="absolute -bottom-1 -right-1 bg-[#6BBF96] text-[#1E1814] rounded-full p-1 border-4 border-[#2C2420]">
<span class="material-symbols-outlined text-sm font-bold" data-icon="check">check</span>
</div>
</div>
</div>
</div>
<!-- Action Button -->
<div class="mt-12 px-2">
<button class="w-full bg-[#C4707E] text-white py-5 rounded-2xl font-rounded font-bold text-lg hover:opacity-90 active:scale-[0.98] transition-all duration-200">
                Registrar venda
            </button>
</div>
</main>
<!-- Shell Filter: Navigation Suppressed for Transactional Focus -->
<!-- BottomNavBar exists in JSON but is suppressed here per "Task-Focused" and "Linear/Transactional" rule -->
</body></html>
