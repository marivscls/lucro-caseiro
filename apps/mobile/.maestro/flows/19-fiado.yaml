# 19 — Fiado: registra venda FIADO (com cliente) e marca "Recebi" na tela Fiado.
# Depende do fix de backend (credit -> status "pending"): com ele, a venda fiado vira
# dívida em aberto e aparece na tela Fiado. Requer a API (Railway) com o fix deployado.
appId: br.com.orionseven.lucrocaseiro
name: 19 - Fiado recebi
tags:
  - crud
---
- runFlow:
    file: ../subflows/open-app.yaml
    env:
      EMAIL: "${EMAIL}"
      PASSWORD: "${PASSWORD}"

# 1) Registra uma venda fiado (com cliente)
- tapOn: "Venda"
- assertVisible: "O que você vai vender?"
- tapOn: "[e2e] Brigadeiro teste"
- tapOn: "Próximo"
- assertVisible: "Selecione o cliente"
- tapOn: "[e2e] Cliente Teste"
- runFlow:
    when:
      notVisible: "Forma de pagamento"
    commands:
      - tapOn: "Próximo"
- assertVisible: "Forma de pagamento"
- tapOn: "Fiado"
- runFlow:
    when:
      notVisible: "Registrar venda"
    commands:
      - tapOn: "Próximo"
- tapOn: "Registrar venda"
# anúncio intersticial (free) cobre o sucesso -> fecha no X. Espera o resultado
# (sucesso, anúncio, ou a tela já resetada) e fecha o que aparecer.
- extendedWaitUntil:
    visible:
      text: "Venda registrada!|Test Ad|Nova Venda"
    timeout: 20000
- repeat:
    times: 8
    commands:
      - runFlow:
          when:
            visible: "Test Ad"
          commands:
            - tapOn:
                point: "94%,3%"
- runFlow:
    when:
      visible: "OK"
    commands:
      - tapOn: "OK"

# 2) Recarrega o app (refetch) e vai pro Fiado — com o fix, a venda credit vira pendente
- runFlow:
    file: ../subflows/open-app.yaml
    env:
      EMAIL: "${EMAIL}"
      PASSWORD: "${PASSWORD}"
- tapOn:
    point: "90%,94%"
- assertVisible: "Mais opções"
- scrollUntilVisible:
    element:
      text: "Fiado"
    direction: DOWN
- tapOn: "Fiado"

# 3) A dívida do cliente aparece -> marca "Recebi"
- extendedWaitUntil:
    visible:
      text: "Recebi"
    timeout: 12000
- tapOn: "Recebi"
- runFlow:
    when:
      visible: "Sim, recebi"
    commands:
      - tapOn: "Sim, recebi"
- takeScreenshot: .maestro/screenshots/19-fiado
