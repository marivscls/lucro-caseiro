<!DOCTYPE html>

<html class="light" lang="pt-br"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@400;700&amp;family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;family=Playfair+Display:wght@700;900&amp;family=Quicksand:wght@400;500;600;700&amp;family=Poppins:wght@600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Quicksand', sans-serif;
            background-color: #FFF5F0;
            color: #4A3228;
        }
        .serif-title {
            font-family: 'Playfair Display', serif;
        }
        .numbers {
            font-family: 'Poppins', sans-serif;
        }
        /* Hide scrollbar for aesthetic purposes */
        ::-webkit-scrollbar {
            display: none;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#C4707E",
                        "secondary": "#D4919C",
                        "background": "#FFF5F0",
                        "surface": "#F5E1DB",
                        "text-main": "#4A3228",
                        "text-sub": "#8B7355",
                        "accent-success": "#6BBF96",
                        "accent-alert": "#E07272",
                        "accent-premium": "#D4A054"
                    },
                    fontFamily: {
                        "headline": ["Playfair Display", "serif"],
                        "body": ["Quicksand", "sans-serif"],
                        "label": ["Quicksand", "sans-serif"],
                        "data": ["Poppins", "sans-serif"]
                    },
                    borderRadius: {
                        "card": "24px",
                        "button": "16px",
                        "input": "12px"
                    }
                }
            }
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background min-h-screen pb-32">
<!-- TopAppBar -->
<nav class="fixed top-0 w-full z-50 bg-[#F5E1DB] transition-colors duration-300">
<div class="flex items-center justify-between px-6 py-4 max-w-screen-xl mx-auto">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-[#C4707E] cursor-pointer hover:opacity-80 transition-opacity active:scale-95 duration-150" data-icon="arrow_back">arrow_back</span>
<h1 class="font-headline text-3xl font-bold tracking-tight text-[#4A3228]">Configurações</h1>
</div>
<div class="w-10 h-10 rounded-full bg-white flex items-center justify-center">
<span class="material-symbols-outlined text-[#C4707E]" data-icon="settings">settings</span>
</div>
</div>
</nav>
<main class="pt-24 px-6 max-w-md mx-auto space-y-8">
<!-- Profile Card -->
<section class="bg-surface rounded-[20px] p-6 space-y-6">
<div class="flex items-center gap-5">
<div class="w-20 h-20 rounded-full bg-[#D4919C] flex items-center justify-center overflow-hidden">
<span class="font-headline text-4xl font-bold text-[#4A3228]">M</span>
</div>
<div class="flex-1 space-y-1">
<h2 class="text-xl font-bold text-[#4A3228]">Maria Silva</h2>
<p class="text-[#8B7355] text-sm">Doces da Maria</p>
<span class="inline-block px-3 py-1 bg-[#FFF5F0] text-[#C4707E] text-xs font-semibold rounded-[8px] tracking-wide">CONFEITARIA</span>
</div>
</div>
<button class="w-full py-3 border border-[#D4919C] text-[#C4707E] font-bold rounded-[12px] hover:bg-[#D4919C]/10 transition-colors active:scale-[0.98]">
                Editar Perfil
            </button>
</section>
<!-- Plan Card -->
<section class="bg-surface rounded-[20px] p-6 space-y-6">
<div class="flex justify-between items-center">
<h3 class="font-bold text-[#4A3228]">Meu Plano</h3>
<span class="px-3 py-1 bg-white text-[#8B7355] text-xs font-bold rounded-full">Gratuito</span>
</div>
<div class="space-y-3">
<div class="flex justify-between text-sm">
<span class="text-[#8B7355]">Uso mensal</span>
<span class="font-data text-[#4A3228] font-bold">28/30 vendas</span>
</div>
<div class="w-full h-3 bg-[#FFF5F0] rounded-full overflow-hidden">
<div class="h-full bg-[#C4707E] rounded-full" style="width: 93%;"></div>
</div>
</div>
<button class="w-full py-4 bg-[#D4A054] text-white font-bold rounded-[16px] hover:opacity-90 transition-opacity flex items-center justify-center gap-2 active:scale-[0.98]">
<span class="material-symbols-outlined" data-icon="star" data-weight="fill" style="font-variation-settings: 'FILL' 1;">star</span>
                Conhecer Premium
            </button>
</section>
<!-- Preferences Card -->
<section class="bg-surface rounded-[20px] p-6 space-y-8">
<div class="space-y-4">
<label class="block font-bold text-[#4A3228] text-sm">Tema do Aplicativo</label>
<div class="flex p-1 bg-[#FFF5F0] rounded-[14px] gap-1">
<button class="flex-1 py-2 bg-[#F5E1DB] text-[#C4707E] font-bold rounded-[12px] text-sm shadow-sm">Claro</button>
<button class="flex-1 py-2 text-[#8B7355] font-medium rounded-[12px] text-sm hover:bg-black/5">Escuro</button>
<button class="flex-1 py-2 text-[#8B7355] font-medium rounded-[12px] text-sm hover:bg-black/5">Auto</button>
</div>
</div>
<div class="flex items-center justify-between">
<div>
<p class="font-bold text-[#4A3228]">Notificações</p>
<p class="text-xs text-[#8B7355]">Alertas de vendas e estoque</p>
</div>
<div class="w-12 h-6 bg-[#C4707E] rounded-full relative cursor-pointer">
<div class="absolute right-1 top-1 w-4 h-4 bg-white rounded-full"></div>
</div>
</div>
</section>
<!-- Account Card -->
<section class="bg-surface rounded-[20px] p-6">
<button class="w-full flex items-center justify-center gap-3 py-2 text-[#E07272] font-bold hover:bg-[#E07272]/5 rounded-xl transition-colors">
<span class="material-symbols-outlined" data-icon="logout">logout</span>
                Sair da Conta
            </button>
<div class="mt-8 text-center">
<p class="text-xs font-data text-[#8B7355] tracking-widest uppercase">v1.0.0</p>
</div>
</section>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center px-4 pb-6 pt-3 bg-white/70 backdrop-blur-xl z-50 rounded-t-[32px]">
<div class="flex flex-col items-center justify-center text-[#8B7355] px-5 py-2 hover:bg-[#F5E1DB]/50 rounded-2xl transition-all cursor-pointer">
<span class="material-symbols-outlined" data-icon="home">home</span>
<span class="font-label text-xs font-semibold uppercase tracking-wider mt-1">Início</span>
</div>
<div class="flex flex-col items-center justify-center text-[#8B7355] px-5 py-2 hover:bg-[#F5E1DB]/50 rounded-2xl transition-all cursor-pointer">
<span class="material-symbols-outlined" data-icon="payments">payments</span>
<span class="font-label text-xs font-semibold uppercase tracking-wider mt-1">Vendas</span>
</div>
<div class="flex flex-col items-center justify-center text-[#8B7355] px-5 py-2 hover:bg-[#F5E1DB]/50 rounded-2xl transition-all cursor-pointer">
<span class="material-symbols-outlined" data-icon="menu_book">menu_book</span>
<span class="font-label text-xs font-semibold uppercase tracking-wider mt-1">Receitas</span>
</div>
<div class="flex flex-col items-center justify-center bg-[#F5E1DB] text-[#C4707E] rounded-2xl px-5 py-2 cursor-default">
<span class="material-symbols-outlined" data-icon="person" data-weight="fill" style="font-variation-settings: 'FILL' 1;">person</span>
<span class="font-label text-xs font-semibold uppercase tracking-wider mt-1">Perfil</span>
</div>
</nav>
<!-- Visual Embellishment: Organic Illustration -->
<div class="fixed bottom-24 right-[-20px] opacity-10 pointer-events-none rotate-12">
<span class="material-symbols-outlined text-[120px] text-[#4A3228]" data-icon="bakery_dining">bakery_dining</span>
</div>
</body></html>
