<!DOCTYPE html>

<style>
        body {
            background-color: #FFF5F0;
            color: #4A3228;
            font-family: 'Quicksand', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;

        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #F5E1DB;
            border-radius: 10px;
        }

<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-[#FFF5F0] min-h-screen pb-32">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-[#FFF5F0]/70 backdrop-blur-md flex justify-between items-center px-6 py-4 w-full">
<div class="flex items-center gap-4">
<button class="text-[#8B7355] hover:opacity-80 transition-opacity">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="font-serif italic text-[#4A3228] text-2xl">Lucro Caseiro</h1>
</div>
<div class="w-10 h-10 rounded-full bg-[#F5E1DB] flex items-center justify-center overflow-hidden">
<img class="w-full h-full object-cover" data-alt="portrait of a smiling artisanal baker wearing a linen apron in a warm sunlit kitchen" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDFnXsS6qyZ69jfITy2BzAkpmVcSmIq2xdDIQWxph1gYqapwtyG1nbTn_YPyCcOmqZnU2e_ZoPLF89w5HtP0RW8RccnDTuquFR5mA0GbLsW9txAf8P-OK3XdV_31KRwUUP2JBnNPpjq2JOxaroyyGC1QKm_YnlM1rPBq4aQkWETOpO5qVzOdrBVkrOvMM53mX4wqAoVpRvH4y0eSliK_1ddYCcJsYGhCxymt-A0qKapali3895xxRaVdxtPclWKodihhG7WdsffmBE"/>
</div>
</header>
<main class="pt-24 px-6 max-w-2xl mx-auto">
<!-- Page Title Section -->
<section class="mb-10">
<h2 class="font-serif text-4xl tracking-tight text-[#4A3228] mb-2">Nova receita</h2>
<p class="text-[#8B7355] font-medium">Transforme sua paixão em lucro detalhando cada ingrediente.</p>
</section>
<!-- Form Section -->
<div class="space-y-8">
<!-- Basic Info -->
<div class="space-y-4">
<div>
<label class="block text-[14px] font-bold text-[#4A3228] mb-2 ml-1">Nome da Receita</label>
<input class="w-full bg-white border-none rounded-[12px] px-5 py-4 text-[#4A3228] placeholder-[#8B7355]/50 focus:ring-2 focus:ring-[#C4707E]/20 outline-none shadow-sm" placeholder="Ex: Bolo de Cenoura com Brigadeiro" type="text"/>
</div>
<div>
<label class="block text-[14px] font-bold text-[#4A3228] mb-3 ml-1">Categoria</label>
<div class="flex flex-wrap gap-2">
<button class="px-4 py-2 rounded-full bg-[#C4707E] text-white text-sm font-semibold transition-all">Bolos</button>
<button class="px-4 py-2 rounded-full bg-[#F5E1DB] text-[#4A3228] text-sm font-medium hover:bg-[#F5E1DB]/80 transition-all">Doces</button>
<button class="px-4 py-2 rounded-full bg-[#F5E1DB] text-[#4A3228] text-sm font-medium hover:bg-[#F5E1DB]/80 transition-all">Pães</button>
<button class="px-4 py-2 rounded-full bg-[#F5E1DB] text-[#4A3228] text-sm font-medium hover:bg-[#F5E1DB]/80 transition-all">Salgados</button>
<button class="px-3 py-2 rounded-full bg-[#F5E1DB] text-[#4A3228] flex items-center">
<span class="material-symbols-outlined text-sm">add</span>
</button>
</div>
</div>
</div>
<!-- Yield & Prep -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<div class="space-y-2">
<label class="block text-[14px] font-bold text-[#4A3228] ml-1">Rendimento</label>
<div class="flex gap-2">
<input class="w-20 bg-white border-none rounded-[12px] px-4 py-3 text-[#4A3228] focus:ring-2 focus:ring-[#C4707E]/20 font-poppins" placeholder="00" type="number"/>
<select class="flex-1 bg-white border-none rounded-[12px] px-4 py-3 text-[#4A3228] focus:ring-2 focus:ring-[#C4707E]/20 appearance-none font-medium">
<option>Unidades</option>
<option>Gramas (g)</option>
<option>Kilos (kg)</option>
<option>Fatias</option>
</select>
</div>
</div>
<div class="flex items-end">
<div class="w-full h-[52px] bg-[#F5E1DB]/50 rounded-[12px] px-4 flex items-center gap-3">
<span class="material-symbols-outlined text-[#C4707E]">schedule</span>
<span class="text-sm font-medium text-[#8B7355]">Tempo estimado: 45 min</span>
</div>
</div>
</div>
<div>
<label class="block text-[14px] font-bold text-[#4A3228] mb-2 ml-1">Modo de Preparo</label>
<textarea class="w-full bg-[#F5E1DB] border-none rounded-[12px] px-5 py-4 text-[#4A3228] placeholder-[#8B7355]/70 focus:ring-2 focus:ring-[#C4707E]/20 outline-none resize-none" placeholder="Descreva os passos com carinho..." rows="4"></textarea>
</div>
<!-- Ingredients Section -->
<div class="space-y-4">
<div class="flex justify-between items-center px-1">
<h3 class="font-serif text-xl text-[#4A3228]">Ingredientes</h3>
<span class="text-xs font-bold uppercase tracking-wider text-[#8B7355]">Custo Total: R$ 0,00</span>
</div>
<div class="space-y-3">
<!-- Ingredient Card -->
<div class="bg-[#F5E1DB] rounded-[20px] p-4 flex flex-col md:flex-row gap-4 items-center">
<div class="flex-1 w-full">
<input class="w-full bg-white/50 border-none rounded-lg px-3 py-2 text-sm text-[#4A3228] focus:ring-1 focus:ring-[#C4707E]/30" placeholder="Nome do ingrediente" type="text"/>
</div>
<div class="flex gap-2 w-full md:w-auto">
<input class="w-20 bg-white/50 border-none rounded-lg px-3 py-2 text-sm text-[#4A3228] focus:ring-1 focus:ring-[#C4707E]/30 font-poppins" placeholder="Qtd" type="number"/>
<select class="flex-1 md:w-28 bg-white/50 border-none rounded-lg px-3 py-2 text-sm text-[#4A3228] focus:ring-1 focus:ring-[#C4707E]/30">
<option>g</option>
<option>ml</option>
<option>un</option>
</select>
<button class="text-[#E07272] hover:bg-white/20 p-2 rounded-lg transition-colors">
<span class="material-symbols-outlined text-lg">delete</span>
</button>
</div>
</div>
<!-- Add Ingredient Button -->
<button class="w-full py-4 rounded-[20px] bg-transparent border-2 border-dashed border-[#D8C1C3] text-[#8B7355] font-bold text-sm hover:bg-[#F5E1DB]/30 transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined">add_circle</span>
                        Adicionar Ingrediente
                    </button>
</div>
</div>
<!-- Illustration Decor -->
<div class="relative py-8 flex justify-center opacity-40">
<img class="w-48 h-auto mix-blend-multiply" data-alt="minimalist flat lay illustration of wooden kitchen tools like a rolling pin and whisk on a cream background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBynmB7uvv5biaoG7yyNaQixjWLjy_XdTMjyBJGbkS5S9hCADB159tB3Ev68QzmRPR9mJr3bbGKECDQvBHOBIHwAR7nViIQzw5pdsjBDWIJtLtEsDWQVX0Me7B475u0HRwMDr6-e1SRLuB_xNgWDE9MSl524nZzng2imf22HonFbpC1zeVCSaIaekRtAMXlgS4A0QR66ZYBojgTHlyFhEmjzDCcs0Kw52gU0f-KNy-1tCU5qQkw3bIFIw7AVm7HXHga4ONE032YFkw"/>
</div>
<!-- Submit Action -->
<div class="pt-4">
<button class="w-full bg-[#C4707E] text-white py-5 rounded-[16px] font-bold text-lg shadow-lg shadow-[#C4707E]/20 hover:opacity-90 active:scale-[0.98] transition-all">
                    Cadastrar Receita
                </button>
</div>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center px-4 pb-6 pt-2 bg-[#FFF5F0]/80 backdrop-blur-xl z-50 rounded-t-[32px]">
<div class="flex flex-col items-center justify-center text-[#C4707E] bg-[#F5E1DB] rounded-2xl px-5 py-2 scale-90 transition-transform duration-300">
<span class="material-symbols-outlined">receipt_long</span>
<span class="font-sans text-[11px] font-medium mt-1">Receitas</span>
</div>
<div class="flex flex-col items-center justify-center text-[#8B7355] opacity-60 hover:bg-[#F5E1DB]/50 transition-opacity">
<span class="material-symbols-outlined">local_mall</span>
<span class="font-sans text-[11px] font-medium mt-1">Vendas</span>
</div>
<div class="flex flex-col items-center justify-center text-[#8B7355] opacity-60 hover:bg-[#F5E1DB]/50 transition-opacity">
<span class="material-symbols-outlined">payments</span>
<span class="font-sans text-[11px] font-medium mt-1">Custos</span>
</div>
<div class="flex flex-col items-center justify-center text-[#8B7355] opacity-60 hover:bg-[#F5E1DB]/50 transition-opacity">
<span class="material-symbols-outlined">person</span>
<span class="font-sans text-[11px] font-medium mt-1">Perfil</span>
</div>
</nav>
</body></html>
