</header>
<div class="space-y-6 relative z-10">
<div class="group">
<label class="block text-xs font-semibold uppercase tracking-wider text-[#8B7355] mb-2 ml-1">Custo Total da Embalagem</label>
<div class="relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 font-data text-[#4A3228] opacity-50">R$</span>
<input class="w-full bg-[#F5E1DB] border-none rounded-[16px] py-4 pl-12 pr-4 font-data text-xl text-[#4A3228] focus:ring-2 focus:ring-[#C4707E]/20 transition-all outline-none" placeholder="0,00" type="text" value="0,00"/>
</div>
</div>
<div class="pt-4">
<p class="text-[13px] text-[#8B7355] leading-relaxed italic">

                    </p>
</div>
</div>
</section>

<div class="mt-10">
<button class="w-full bg-[#C4707E] text-white font-sans font-bold py-4 rounded-[16px] hover:opacity-90 transition-opacity active:scale-[0.98] duration-150 text-lg shadow-sm">
