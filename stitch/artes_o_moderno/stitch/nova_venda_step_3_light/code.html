<body class="min-h-screen flex flex-col items-center">
<!-- TopAppBar -->
<header class="bg-[#FFF5F0] flex items-center justify-between w-full px-6 py-4 fixed top-0 z-50">
<button class="text-[#C4707E] hover:opacity-80 transition-opacity scale-95 duration-200">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
<h1 class="font-['Playfair_Display'] text-2xl font-bold tracking-tight text-[#4A3228]">Nova Venda</h1>
<div class="w-6"></div> <!-- Spacer for centering -->
</header>
<main class="w-full max-w-md px-6 pt-24 pb-32 flex flex-col flex-grow">
<!-- Step Indicator (4 dots) -->
<div class="flex justify-center gap-2 mb-8">
<div class="w-2.5 h-2.5 rounded-full bg-[#D4919C]/30"></div>
<div class="w-2.5 h-2.5 rounded-full bg-[#D4919C]/30"></div>
<div class="w-2.5 h-2.5 rounded-full bg-[#C4707E]"></div>
<div class="w-2.5 h-2.5 rounded-full bg-[#D4919C]/30"></div>
</div>
<!-- Headline -->
<div class="mb-10 text-center">
<h2 class="font-['Playfair_Display'] text-4xl text-[#4A3228] mb-2 leading-tight">Como vai receber?</h2>
<p class="text-[#8B7355] text-sm">Selecione o método de pagamento</p>
</div>
<!-- Payment Grid (Asymmetric layout feel via spacing and card states) -->
<div class="grid grid-cols-2 gap-4">
<!-- Card 1: Pix (Selected) -->
<button class="relative bg-white p-6 rounded-2xl flex flex-col items-center justify-center transition-all duration-300 ring-2 ring-[#C4707E] group">
<div class="absolute top-3 right-3 text-[#C4707E]">
<span class="material-symbols-outlined" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
<div class="w-16 h-16 bg-[#89A5B5]/10 rounded-full flex items-center justify-center mb-4">
<span class="material-symbols-outlined text-4xl text-[#89A5B5]" data-icon="cell_tower">cell_tower</span>
</div>
<span class="font-bold text-[#4A3228] text-lg">Pix</span>
<div class="absolute -bottom-2 -right-2 opacity-10 pointer-events-none overflow-hidden">
<img alt="" class="w-12 h-12" data-alt="minimalist flat line art illustration of a mobile phone with sparkles in soft blue tones" src="https://lh3.googleusercontent.com/aida-public/AB6AXuD2XPn3vPw87haPAaVCMlEiZvZ7y5JPQkk4QawEYG2I5zL8T2dLTPntPJkjtlSAVweBunmzAz1HLBPR8iS7NKsL-uQ6n4i6LqXzbHcVsqASZBw-LSGEE4AJ4zFTT_nLckO9sAz2iBHF5EtBp_jQeQDIS54gXqVesgD8fxYt-Rui7vv5mCxBwQbNlxuxNhYoQRcYdIJmW08bv63HdCGJbzM58LLlSCDm6S0yEcvH7HYRj2uxHOCVe41imBvEAaVFje7Zkdonrc6HaXs"/>
</div>
</button>
<!-- Card 2: Dinheiro -->
<button class="bg-[#F5E1DB] p-6 rounded-2xl flex flex-col items-center justify-center transition-all duration-300 hover:bg-[#F5E1DB]/80 group">
<div class="w-16 h-16 bg-[#6BBF96]/10 rounded-full flex items-center justify-center mb-4">
<span class="material-symbols-outlined text-4xl text-[#6BBF96]" data-icon="payments">payments</span>
</div>
<span class="font-semibold text-[#8B7355] group-hover:text-[#4A3228]">Dinheiro</span>
</button>
<!-- Card 3: Cartão -->
<button class="bg-[#F5E1DB] p-6 rounded-2xl flex flex-col items-center justify-center transition-all duration-300 hover:bg-[#F5E1DB]/80 group">
<div class="w-16 h-16 bg-[#B8A9D4]/10 rounded-full flex items-center justify-center mb-4">
<span class="material-symbols-outlined text-4xl text-[#B8A9D4]" data-icon="credit_card">credit_card</span>
</div>
<span class="font-semibold text-[#8B7355] group-hover:text-[#4A3228]">Cartão</span>
</button>
<!-- Card 4: Fiado -->
<button class="bg-[#F5E1DB] p-6 rounded-2xl flex flex-col items-center justify-center transition-all duration-300 hover:bg-[#F5E1DB]/80 group">
<div class="w-16 h-16 bg-[#D4A054]/10 rounded-full flex items-center justify-center mb-4">
<span class="material-symbols-outlined text-4xl text-[#D4A054]" data-icon="schedule">schedule</span>
</div>
<span class="font-semibold text-[#8B7355] group-hover:text-[#4A3228]">Fiado</span>
</button>
<!-- Card 5: Transferência (Full width or offset for organic feel) -->
<button class="col-span-2 bg-[#F5E1DB] p-6 rounded-2xl flex items-center justify-center gap-6 transition-all duration-300 hover:bg-[#F5E1DB]/80 group">
<div class="w-16 h-16 bg-[#89A5B5]/10 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined text-4xl text-[#89A5B5]" data-icon="account_balance">account_balance</span>
</div>
<span class="font-semibold text-[#8B7355] text-lg group-hover:text-[#4A3228]">Transferência Bancária</span>
</button>
</div>
<!-- Decorative Illustration Element -->
<div class="mt-12 opacity-40 flex justify-center">
<img alt="" class="w-32 h-32 object-contain" data-alt="minimalist organic flat illustration of a vintage coffee mill and wheat grains in soft earthy terracotta and cream colors" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDEte6AjU55ox5sNxCCahODCkVdi7Fa5bLx0JdsruW5zM3CuwLuCwE0tkH5PVaPeaBZ0C0xFZGJSFZu1HzsMyUlDpsRa0JiQQn3imWXIrF0Agbz9YQOdZJiANHMMicd9M32aamRHM8LtEPwwr2Gz1hBA4XYjirBKpgPzBln1nYgh-kU2HyIz7G1dQJtXm9Hse7iwJDhC6WlxPlP6Bf_1jT1pNJWP7HoX0-GCmWGwAjRnBwGEBUWLK-D34gU6nF-f8yIiSzBtP02EAg"/>
</div>
</main>
<!-- Bottom Actions Container -->
<footer class="fixed bottom-0 left-0 w-full p-6 bg-[#FFF5F0]/70 backdrop-blur-md z-50">
<div class="max-w-md mx-auto flex gap-4">
<button class="flex-grow bg-[#C4707E] text-white py-4 rounded-2xl font-bold text-lg flex items-center justify-center gap-2 hover:opacity-90 transition-all active:scale-95">
                Próximo
                <span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</footer>
<!-- BottomNavBar (Suppressed as per "Destination" Rule for Transactional/Linear flow, but shown if technically required by global layout logic. In this specific "Step 3" task, we focus on the transactional canvas but keep the structure ready. If hidden, content takes full space.) -->
</body></html>
