<body class="bg-[#1E1814] text-[#F5E1DB] min-h-screen flex flex-col items-center">
<!-- Top Navigation Bar -->
<header class="bg-[#1E1814] fixed top-0 w-full z-50">
<div class="flex justify-between items-center px-6 py-4 w-full max-w-4xl mx-auto">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-[#D4919C] cursor-pointer hover:opacity-80 transition-opacity">menu</span>
<h1 class="font-serif italic text-2xl text-[#D4919C]">Atelier de Preços</h1>
</div>
<div class="w-10 h-10 rounded-full bg-[#2C2420] border-2 border-[#D4919C]/20 flex items-center justify-center overflow-hidden">
<img class="w-full h-full object-cover" data-alt="close-up portrait of a smiling female pastry chef in a dark artisanal kitchen wearing a neutral linen apron" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBLKfucY0naaD2Ei5b7hHc1T8R_JP4UXFiJ56zzLR9K2W_p7oDoby1U6rwtNGcjXAnU3Vvp3NnHmd2NvYUkL1Uvb8rhaipg_AqykRR4gJ2jkCxGZ6FPadlChIpl1DAyafJZG4Og525qtsrobH2Tp-BuyM1i2qoSAvq46U1Ib_Q6Im0yB7pY3TCxDD7rrnmEvLyUTLoRA4UReDQWmeTpwTuKRL4n9Yw3lBRfJFCIHKilTekppAGa2TT11jf8XuFal1vEPg_zq3Of87g"/>
</div>
</div>
<div class="bg-[#2C2420] h-px w-full opacity-20"></div>
</header>
<!-- Main Content Canvas -->
<main class="w-full max-w-xl px-6 pt-28 pb-32 flex flex-col items-center">
<!-- Progress Stepper -->
<div class="flex gap-3 mb-12">
<div class="w-2.5 h-2.5 rounded-full bg-[#D4919C]/30"></div>
<div class="w-2.5 h-2.5 rounded-full bg-[#D4919C]/30"></div>
<div class="w-8 h-2.5 rounded-full bg-[#C4707E]"></div>
<div class="w-2.5 h-2.5 rounded-full bg-[#D4919C]/30"></div>
<div class="w-2.5 h-2.5 rounded-full bg-[#D4919C]/30"></div>
</div>
<!-- Section Header -->
<div class="text-center mb-10 w-full">
<h2 class="font-serif text-4xl text-[#F5E1DB] mb-2">Mao de obra</h2>
<p class="font-sans text-sm text-[#8B7355]">Calcule o custo do seu tempo artesanal</p>
</div>
<!-- Illustration Overlay Section -->
<div class="relative w-full mb-8 flex justify-center">
<div class="w-48 h-48 bg-[#2C2420] rounded-full flex items-center justify-center relative overflow-hidden">
<div class="absolute -right-4 -bottom-4 opacity-20 transform rotate-12">
<span class="material-symbols-outlined text-8xl text-[#C4707E]" style="font-variation-settings: 'opsz' 48;">settings</span>
</div>
<span class="material-symbols-outlined text-[#C4707E] text-7xl" data-icon="schedule" style="font-variation-settings: 'FILL' 0;">schedule</span>
</div>
</div>
<!-- Input Form Bento Card -->
<div class="w-full bg-[#2C2420] rounded-[24px] p-8 mb-6 relative overflow-hidden">
<div class="grid grid-cols-2 gap-4 relative z-10">
<div class="flex flex-col gap-2">
<label class="font-sans text-xs uppercase tracking-widest text-[#8B7355] ml-1">Tempo (min)</label>
<input class="w-full bg-[#1E1814] border-none rounded-[16px] px-4 py-4 text-[#F5E1DB] font-data text-xl focus:ring-2 focus:ring-[#C4707E] transition-all outline-none" placeholder="0" type="number"/>
</div>
<div class="flex flex-col gap-2">
<label class="font-sans text-xs uppercase tracking-widest text-[#8B7355] ml-1">Valor/hora R$</label>
<input class="w-full bg-[#1E1814] border-none rounded-[16px] px-4 py-4 text-[#F5E1DB] font-data text-xl focus:ring-2 focus:ring-[#C4707E] transition-all outline-none" placeholder="0,00" type="number"/>
</div>
</div>
<!-- Result Display -->
<div class="mt-8 pt-6 border-t border-[#F5E1DB]/5 flex flex-col items-center">
<span class="font-sans text-xs text-[#8B7355] mb-2">Custo Calculado</span>
<div class="text-[#6BBF96] font-data text-4xl font-bold">= R$ 5,00</div>
</div>
<!-- Organic bleed illustration -->
<div class="absolute top-0 right-0 w-24 h-24 pointer-events-none opacity-5">
<img class="w-full h-full object-contain" data-alt="minimalist flat illustration of golden watch gears and mechanical clock parts on a dark background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBQnlhWu6o1mMmSncZLcpahKez5jPmIAoz7pL7J4BzXvPIWHU_ZXufSFTktvmz_uXAeMB2jZWfP4TGUYgLAlYX145KyU9VOouorZwlGqSPSyAvMdm1wSCt91upV584Q1IzeNJl6RX8ailiy797Wz6EU9IxPwJfdY__Ax0aQIdJKp2a1RFjNwlWmotaj0lkAe7fjy-ypxpFv7KQvc5E4ATuBmo-gNX1Hcwap7YUieCRWKnZBz-dt-nEriUTWfVV97mTimph6TQzB7JM"/>
</div>
</div>
<!-- Action Button -->
<button class="w-full bg-[#C4707E] text-[#FFFFFF] font-sans font-bold py-5 rounded-[16px] text-lg hover:opacity-90 active:scale-95 transition-all flex items-center justify-center gap-3">
            Proximo
            <span class="material-symbols-outlined">arrow_forward</span>
</button>
</main>
<!-- Navigation Shell (BottomNavBar) -->
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center px-4 pb-6 pt-3 bg-[#1E1814]/70 backdrop-blur-md rounded-t-[24px] z-50">
<a class="flex flex-col items-center justify-center text-[#8B7355] opacity-70 hover:text-[#C4707E] transition-colors" href="#">
<span class="material-symbols-outlined mb-1">home</span>
<span class="font-sans text-[10px] font-semibold uppercase tracking-wider">Início</span>
</a>
<a class="flex flex-col items-center justify-center bg-[#2C2420] text-[#C4707E] rounded-2xl px-3 py-1.5 active:scale-90 transition-transform duration-200" href="#">
<span class="material-symbols-outlined mb-1">calculate</span>
<span class="font-sans text-[10px] font-semibold uppercase tracking-wider">Cálculos</span>
</a>
<a class="flex flex-col items-center justify-center text-[#8B7355] opacity-70 hover:text-[#C4707E] transition-colors" href="#">
<span class="material-symbols-outlined mb-1">history</span>
<span class="font-sans text-[10px] font-semibold uppercase tracking-wider">Histórico</span>
</a>
<a class="flex flex-col items-center justify-center text-[#8B7355] opacity-70 hover:text-[#C4707E] transition-colors" href="#">
<span class="material-symbols-outlined mb-1">lightbulb</span>
<span class="font-sans text-[10px] font-semibold uppercase tracking-wider">Dicas</span>
</a>
<a class="flex flex-col items-center justify-center text-[#8B7355] opacity-70 hover:text-[#C4707E] transition-colors" href="#">
<span class="material-symbols-outlined mb-1">person</span>
<span class="font-sans text-[10px] font-semibold uppercase tracking-wider">Perfil</span>
</a>
</nav>
</body></html>
